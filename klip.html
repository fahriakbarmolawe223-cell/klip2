<!DOCTYPE html>
<html lang="id">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 0.5rem) + 0.5rem); }
        input[type="text"], input[type="number"] { -webkit-appearance: none; -moz-appearance: textfield; }
        * { -webkit-tap-highlight-color: transparent; }
        @keyframes fadeIn { from{opacity:0}to{opacity:1} }
        @keyframes slideUp { from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1} }
        @keyframes slideDown { from{transform:translateY(-14px);opacity:0}to{transform:translateY(0);opacity:1} }
        .fade-in { animation: fadeIn 260ms cubic-bezier(0.2,0.8,0.2,1) both; }
        .slide-up { animation: slideUp 280ms cubic-bezier(0.2,0.8,0.2,1) both; }
        .slide-down { animation: slideDown 260ms cubic-bezier(0.2,0.8,0.2,1) both; }
        #smart-drawer { will-change: transform, height; }
        #smart-drawer.snapping {
            transition: height 370ms cubic-bezier(0.32,0.72,0,1),
                        transform 370ms cubic-bezier(0.32,0.72,0,1);
        }
        .strength-bar { transition: width 280ms ease, background-color 280ms ease; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-100 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-white select-none overflow-hidden overscroll-none">
<div id="root"></div>
<script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Copy, Check, CreditCard, MapPin, User, Eye, EyeOff, Type,
      Trash2, Calculator, KeyRound, RefreshCw, Scissors, ChevronUp,
      Plus, ShieldAlert, FileText, Link as LinkIcon,
      Scan, Crown, Phone, Mail, Hash, Wand2, Settings2, Lock,
      Palette, MessageSquare, Search, X, Bold, Italic,
      Strikethrough, History, ShieldCheck, Shuffle
    } from 'lucide-react';

    /* ─── Themes ─────────────────────────────────── */
    const THEMES = {
      slate:   { bg:'bg-slate-900 dark:bg-slate-800',   text:'text-slate-900 dark:text-slate-100',   border:'border-slate-900 dark:border-slate-700',   light:'bg-slate-100 dark:bg-slate-800',  glow:'shadow-[0_0_20px_rgba(15,23,42,0.5)] dark:shadow-[0_0_20px_rgba(0,0,0,0.5)]',   dialText:'text-slate-400 dark:text-slate-400',  hex:'#0f172a' },
      indigo:  { bg:'bg-indigo-600 dark:bg-indigo-500',  text:'text-indigo-600 dark:text-indigo-400',  border:'border-indigo-600 dark:border-indigo-500',  light:'bg-indigo-50 dark:bg-indigo-900/30',  glow:'shadow-[0_0_20px_rgba(79,70,229,0.5)] dark:shadow-[0_0_20px_rgba(79,70,229,0.5)]',  dialText:'text-indigo-400', hex:'#4f46e5' },
      emerald: { bg:'bg-emerald-500 dark:bg-emerald-600', text:'text-emerald-600 dark:text-emerald-400', border:'border-emerald-500 dark:border-emerald-600', light:'bg-emerald-50 dark:bg-emerald-900/30', glow:'shadow-[0_0_20px_rgba(16,185,129,0.5)] dark:shadow-[0_0_20px_rgba(16,185,129,0.5)]', dialText:'text-emerald-400',hex:'#10b981' },
      rose:    { bg:'bg-rose-500 dark:bg-rose-600',    text:'text-rose-600 dark:text-rose-400',    border:'border-rose-500 dark:border-rose-600',    light:'bg-rose-50 dark:bg-rose-900/30',    glow:'shadow-[0_0_20px_rgba(244,63,94,0.5)] dark:shadow-[0_0_20px_rgba(244,63,94,0.5)]',  dialText:'text-rose-400',   hex:'#f43f5e' },
    };

    const COLLAPSED_H = 72;
    const expandedH = () => Math.round(window.innerHeight * 0.82);

    /* ─── Helpers ────────────────────────────────── */
    const fmt = (raw) => { const d=String(raw).replace(/\D/g,''); return d?parseInt(d,10).toLocaleString('id-ID'):''; };
    const parse = (s) => s.replace(/\./g,'').replace(/,/g,'').replace(/\D/g,'');

    const pwdStrength = (p) => {
      if(!p||p.length<4) return {score:0,label:'Sangat Lemah',color:'bg-red-400'};
      let s=0;
      if(p.length>=8)s++; if(p.length>=12)s++; if(p.length>=16)s++;
      if(/[A-Z]/.test(p))s++; if(/[a-z]/.test(p))s++;
      if(/\d/.test(p))s++; if(/[^A-Za-z0-9]/.test(p))s++;
      if(s<=2) return {score:Math.round(s/7*100),label:'Lemah',      color:'bg-red-400'};
      if(s<=4) return {score:Math.round(s/7*100),label:'Cukup',      color:'bg-amber-400'};
      if(s<=5) return {score:Math.round(s/7*100),label:'Kuat',       color:'bg-emerald-400'};
      return          {score:Math.round(s/7*100),label:'Sangat Kuat',color:'bg-emerald-500'};
    };

    /* ── Local Storage Hook ── */
    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.error(error);
          return initialValue;
        }
      });
      const setValue = value => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.error(error);
        }
      };
      return [storedValue, setValue];
    }

    /* ═══════════════════════════════════════════════
       MAIN APP
    ══════════════════════════════════════════════════ */
    function KlipApp() {
      const [isProMode, setIsProMode] = useLocalStorage('klip_pro_mode', false);
      const [activeTheme, setActiveTheme] = useLocalStorage('klip_theme', 'slate');
      const [darkMode, setDarkMode] = useLocalStorage('klip_dark_mode', false);
      const [isGlobalOpen, setIsGlobalOpen] = useState(false);
      const [activeTab, setActiveTab] = useState('brankas');
      const [isDialOpen, setIsDialOpen] = useState(false);
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [toastMsg, setToastMsg] = useState('');
      const th = THEMES[activeTheme];

      /* ── Drawer swipe engine ── */
      const drawerRef = useRef(null);
      const drag = useRef({ active:false, startY:0, startOpen:false, lastDy:0 });

      const snapDrawer = useCallback((toOpen) => {
        const el = drawerRef.current; if(!el) return;
        el.classList.add('snapping');
        el.style.height = (toOpen ? expandedH() : COLLAPSED_H) + 'px';
        el.style.transform = 'translateY(0)';
        setDrawerOpen(toOpen);
        setTimeout(() => el && el.classList.remove('snapping'), 400);
      }, []);

      const onDragStart = (clientY) => {
        const el = drawerRef.current; if(!el) return;
        el.classList.remove('snapping');
        drag.current = { active:true, startY:clientY, startOpen:drawerOpen, lastDy:0 };
      };
      const onDragMove = (clientY) => {
        if(!drag.current.active) return;
        const el = drawerRef.current; if(!el) return;
        const dy = clientY - drag.current.startY;
        drag.current.lastDy = dy;
        if(drag.current.startOpen && dy > 0) {
          el.style.transform = `translateY(${Math.min(dy, expandedH()-COLLAPSED_H)}px)`;
        } else if(!drag.current.startOpen && dy < 0) {
          el.style.height = Math.min(COLLAPSED_H + Math.abs(dy), expandedH()) + 'px';
          el.style.transform = 'translateY(0)';
        }
      };
      const onDragEnd = () => {
        if(!drag.current.active) return;
        drag.current.active = false;
        const dy = drag.current.lastDy;
        snapDrawer(drag.current.startOpen ? dy < 100 : dy < -50);
      };

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      useEffect(() => {
        const el = drawerRef.current; if(!el) return;
        el.style.height = COLLAPSED_H + 'px';
        el.style.transform = 'translateY(0)';
      }, []);

      /* ── Toast ── */
      const toast = useCallback((msg) => {
        setToastMsg(msg);
        setTimeout(()=>setToastMsg(''), 2200);
      }, []);

      /* ── Clipboard ── */
      const copy = useCallback((text, label) => {
        const go = () => toast(`${label} disalin!`);
        if(navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(go);
        } else {
          const ta = document.createElement('textarea');
          ta.value=text; ta.style.cssText='position:fixed;top:0;left:0';
          document.body.appendChild(ta); ta.focus(); ta.select();
          try{document.execCommand('copy');go();}catch(e){}
          document.body.removeChild(ta);
        }
      }, [toast]);

      /* ── Ekstrak state ── */
      const [ekstrakText, setEkstrakText] = useState('');
      const [ekstrakRes, setEkstrakRes] = useState({ phones:[],links:[],emails:[],numbers:[],prices:[],dates:[] });
      const [autoClean, setAutoClean] = useState(true);
      const [extFilter, setExtFilter] = useState('all');

      /* ── Brankas state ── */
      const [vaultFilter, setVaultFilter] = useState('all');
      const [vaultSearch, setVaultSearch] = useState('');
      const [vaultItems, setVaultItems] = useLocalStorage('klip_vault', [
        {id:'1',title:'Rekening BCA',  value:'8720 1928 33',    category:'bank',isPrivate:false,note:'BCA atas nama Budi Santoso'},
        {id:'2',title:'NIK (KTP)',     value:'3271042908950002', category:'id',  isPrivate:true, note:''},
      ]);
      const [revealed,       setRevealed]      = useState({});
      const [confirmDel,     setConfirmDel]    = useState(null);
      const [newTitle,       setNewTitle]      = useState('');
      const [newValue,       setNewValue]      = useState('');
      const [newCat,         setNewCat]        = useState('bank');
      const [newPrivate,     setNewPrivate]    = useState(false);
      const [newNote,        setNewNote]       = useState('');

      /* ── Draf state ── */
      const [draftText, setDraftText] = useLocalStorage('klip_draft', '');

      /* ── Hitung state ── */
      const [billAmt,   setBillAmt]  = useState('');
      const [taxPct,    setTaxPct]   = useState('0');
      const [svcPct,    setSvcPct]   = useState('0');
      const [tipPct,    setTipPct]   = useState('0');
      const [pplCnt,    setPplCnt]   = useState('2');
      const [discAmt,   setDiscAmt]  = useState('');
      const [roundUp,   setRoundUp]  = useState(true);
      const [calcMode,  setCalcMode] = useState('split');
      const [pctVal,    setPctVal]   = useState('');
      const [pctPct,    setPctPct]   = useState('');

      /* ── Sandi state ── */
      const [password,  setPassword]  = useState('');
      const [pwdLen,    setPwdLen]    = useState(12);
      const [useUpper,  setUseUpper]  = useState(true);
      const [useLower,  setUseLower]  = useState(true);
      const [useNums,   setUseNums]   = useState(true);
      const [useSyms,   setUseSyms]   = useState(true);
      const [excAmbig,  setExcAmbig]  = useState(true);
      const [passph,    setPassph]    = useState(false);
      const [sandiMode, setSandiMode] = useState('pwd');
      const [pinLen,    setPinLen]    = useState(6);
      const [showPwd,   setShowPwd]   = useState(false);
      const [pwdHist,   setPwdHist]   = useState([]);

      /* ── Tab change ── */
      useEffect(() => {
        snapDrawer(false);
        if(activeTab==='sandi'&&!password) generatePassword();
        if(activeTab==='ekstrak'&&!isProMode){setActiveTab('brankas');toast('Ekstrak khusus Pro');}
      }, [activeTab]);

      /* ── Password gen ── */
      const generatePassword = useCallback(() => {
        let p='';
        if(sandiMode==='pin'){
          const a=new Uint32Array(pinLen); window.crypto.getRandomValues(a);
          p=Array.from(a).map(v=>v%10).join('');
        } else if(isProMode&&passph){
          const ws=['kopi','senja','kucing','langit','buku','hujan','angin','laut','bumi','bulan','meja','kaca','besi','emas','awan','pohon','jalan','rumah','pintu','lampu'];
          const r=()=>ws[Math.floor(Math.random()*ws.length)];
          p=`${r()}-${r()}-${Math.floor(Math.random()*99)+1}`;
        } else {
          let lo='abcdefghijklmnopqrstuvwxyz',up='ABCDEFGHIJKLMNOPQRSTUVWXYZ',nm='0123456789',sy='!@#$%^&*()_+~`|}{[]:;?><,./-=';
          if(excAmbig){lo=lo.replace(/[ilou]/g,'');up=up.replace(/[ILOU]/g,'');nm=nm.replace(/[10]/g,'');}
          let cs='';
          if(useLower)cs+=lo; if(useUpper)cs+=up; if(useNums)cs+=nm; if(useSyms)cs+=sy;
          if(!cs){setPassword('Pilih karakter!');return;}
          const a=new Uint32Array(parseInt(pwdLen)||12); window.crypto.getRandomValues(a);
          p=Array.from(a).map(v=>cs[v%cs.length]).join('');
        }
        setPassword(p);
        if(isProMode) setPwdHist(h=>[p,...h].slice(0,5));
      }, [sandiMode,pinLen,isProMode,passph,excAmbig,useLower,useUpper,useNums,useSyms,pwdLen]);

      useEffect(()=>{if(activeTab==='sandi')generatePassword();},[pwdLen,useUpper,useLower,useNums,useSyms,excAmbig,passph,sandiMode,pinLen]);

      /* ── Ekstrak logic ── */
      useEffect(()=>{
        if(!ekstrakText.trim()){setEkstrakRes({phones:[],links:[],emails:[],numbers:[],prices:[],dates:[]});return;}
        const links  = [...new Set(ekstrakText.match(/(https?:\/\/[^\s]+)/g)||[])];
        const emails = [...new Set(ekstrakText.match(/([a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+\.[a-zA-Z0-9_-]+)/g)||[])];
        const prices = [...new Set(ekstrakText.match(/(?:Rp\.?\s?)[\d.,]+/gi)||[])];
        const dates  = [...new Set(ekstrakText.match(/\b(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})\b/g)||[])];
        const rawPh  = ekstrakText.match(/(?:\+62|62|08)\d[\d\-\s]{7,13}/g)||[];
        const phones = [...new Set(rawPh.map(p=>autoClean?p.replace(/[\-\s]/g,''):p))];
        const rawNm  = ekstrakText.match(/\b\d{10,16}\b/g)||[];
        const numbers= [...new Set(rawNm)].filter(n=>!phones.some(p=>p.includes(n)));
        setEkstrakRes({phones,links,emails,numbers,prices,dates});
      },[ekstrakText,autoClean]);

      /* ── Vault helpers ── */
      const addVault = (e) => {
        e.preventDefault();
        if(!newTitle.trim()||!newValue.trim()) return;
        setVaultItems([{id:Date.now().toString(),title:newTitle,value:newValue,category:newCat,isPrivate:newPrivate,note:isProMode?newNote:''}, ...vaultItems]);
        setNewTitle('');setNewValue('');setNewNote('');
        snapDrawer(false);toast('Tersimpan!');
      };
      const saveToVault = (value,cat) => {
        const title = cat==='phone'?'No. Telepon':cat==='email'?'Email':cat==='link'?'Link':'Nomor';
        setVaultItems([{id:Date.now().toString(),title,value,category:cat==='link'?'link':'bank',isPrivate:false,note:''}, ...vaultItems]);
        toast('Disimpan ke Brankas!');
      };

      /* ── Draf helpers ── */
      const applyDraft = (fn) => setDraftText(t=>{toast('Diterapkan!');return fn(t);});
      const wc = draftText.trim()?draftText.trim().split(/\s+/).length:0;
      const sc = draftText.split(/[.!?]+/).filter(s=>s.trim()).length;

      /* ── Hitung compute ── */
      const base  = Number(parse(billAmt))||0;
      const disc  = Number(parse(discAmt))||0;
      const after = Math.max(0,base-disc);
      const taxA  = after*(Number(taxPct)/100);
      const svcA  = after*(Number(svcPct)/100);
      const tipA  = after*(Number(tipPct)/100);
      const total = after+taxA+svcA+tipA;
      const n     = Math.max(1,Number(pplCnt));
      let   split = total/n;
      if(roundUp&&split>0) split=Math.ceil(split/1000)*1000;
      const pctRes = (Number(parse(pctVal))||0)*(Number(pctPct)||0)/100;

      /* ════════════════════════════════════
         RENDERS
      ═════════════════════════════════════ */

      /* ── Ekstrak ── */
      const ECard = ({icon,text,cat}) => (
        <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-3 rounded-xl flex items-center justify-between shadow-sm">
          <div className="flex items-center gap-3 overflow-hidden flex-1">
            <div className="h-9 w-9 bg-slate-50 dark:bg-slate-800 rounded-lg flex items-center justify-center flex-shrink-0">{icon}</div>
            <p className="font-mono font-semibold text-slate-800 dark:text-slate-200 text-sm truncate">{text}</p>
          </div>
          <div className="flex gap-1.5 ml-2 flex-shrink-0">
            {isProMode&&<button onClick={()=>saveToVault(text,cat)} className="h-9 w-9 bg-emerald-50 rounded-lg flex items-center justify-center text-emerald-600 active:scale-90"><Plus size={14}/></button>}
            <button onClick={()=>copy(text,'Data')} className="h-9 w-9 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-800 rounded-lg flex items-center justify-center text-slate-600 dark:text-slate-400 active:scale-90"><Copy size={14}/></button>
          </div>
        </div>
      );

      const renderEkstrak = () => {
        const cats={numbers:ekstrakRes.numbers,phones:ekstrakRes.phones,prices:ekstrakRes.prices,emails:ekstrakRes.emails,dates:ekstrakRes.dates,links:ekstrakRes.links};
        const totalFound=Object.values(cats).reduce((s,a)=>s+a.length,0);
        const show=(k)=>extFilter==='all'||extFilter===k;
        return(
          <div className="fade-in space-y-4 pt-2 pb-48 pr-12">
            <div className="flex items-center gap-2 mb-1">
              <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Ekstrak.</h2>
              <span className="bg-amber-500 text-white text-[9px] font-black px-2 py-0.5 rounded-md uppercase flex items-center gap-1"><Crown size={9}/> Pro</span>
            </div>
            <p className="text-slate-500 dark:text-slate-400 text-xs -mt-3">Tempel teks berantakan, ambil semua datanya.</p>
            <div className="relative">
              <textarea placeholder="Tempel pesan, chat, email, notifikasi..." className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-2xl p-4 text-slate-800 dark:text-slate-200 focus:outline-none resize-none font-medium h-28 hide-scrollbar`} value={ekstrakText} onChange={e=>setEkstrakText(e.target.value)}/>
              {!ekstrakText&&<button onClick={async()=>{try{const t=await navigator.clipboard.readText();setEkstrakText(t);toast('Ditempel!');}catch{toast('Izin clipboard ditolak');}}} className={`absolute bottom-3 right-3 ${th.bg} text-white px-3 py-1.5 rounded-xl text-xs font-bold flex items-center gap-1.5 active:scale-95`}><FileText size={12}/> Paste</button>}
              {ekstrakText&&<button onClick={()=>{setEkstrakText('');setExtFilter('all');}} className="absolute top-3 right-3 bg-white dark:bg-slate-900/90 p-1.5 rounded-lg text-slate-400 active:scale-90"><X size={13}/></button>}
            </div>
            {ekstrakText.trim()&&totalFound>0&&(
              <div className="flex gap-2 overflow-x-auto hide-scrollbar">
                {[['all',`Semua (${totalFound})`],['numbers',`Rekening (${cats.numbers.length})`],['phones',`HP (${cats.phones.length})`],['prices',`Harga (${cats.prices.length})`],['emails',`Email (${cats.emails.length})`],['dates',`Tanggal (${cats.dates.length})`],['links',`Link (${cats.links.length})`]].map(([k,l])=>{
                  const cnt=k==='all'?totalFound:(cats[k]||[]).length;
                  if(k!=='all'&&cnt===0) return null;
                  return <button key={k} onClick={()=>setExtFilter(k)} className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap flex-shrink-0 border active:scale-95 ${extFilter===k?th.bg+' text-white border-transparent':'bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{l}</button>;
                })}
              </div>
            )}
            {ekstrakText.trim()&&(
              <div className="space-y-4">
                {totalFound===0&&<div className="text-center py-12 bg-slate-50 dark:bg-slate-800 border border-dashed border-slate-200 dark:border-slate-700 rounded-2xl"><Wand2 size={20} className="mx-auto mb-2 text-slate-300"/><p className="text-slate-400 text-sm">Tidak ada data terdeteksi</p></div>}
                {show('numbers')&&cats.numbers.length>0&&<div><div className="flex items-center justify-between mb-2"><h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><Hash size={11}/> Rekening/ID</h3><button onClick={()=>copy(cats.numbers.join('\n'),'Semua rekening')} className="text-xs text-slate-400 font-bold active:scale-95">Salin semua</button></div><div className="space-y-2">{cats.numbers.map((v,i)=><ECard key={i} icon={<CreditCard size={15} className={th.text}/>} text={v} cat="number"/>)}</div></div>}

        </div>
      );

      /* ════════════════════════════════════
         GLOBAL SETTINGS
      ═════════════════════════════════════ */
      const renderGlobal = () => {
        if(!isGlobalOpen) return null;
        return(
          <div className="absolute inset-0 z-[100] bg-[#FAFAFA] dark:bg-slate-950 flex flex-col slide-up">
            <div className="px-6 pt-10 pb-4 flex justify-between items-center border-b border-slate-100 dark:border-slate-800">
              <h2 className="text-2xl font-black text-slate-900 dark:text-white">Pengaturan</h2>
              <button onClick={()=>setIsGlobalOpen(false)} className="h-10 w-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center active:scale-90"><X size={19} className="text-slate-600 dark:text-slate-400"/></button>
            </div>
            <div className="flex-1 overflow-y-auto px-6 py-6 space-y-8 hide-scrollbar">
              <section>
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Palette size={14}/> Tema Warna</h3>
                <div className="flex gap-4">
                  {Object.keys(THEMES).map(k=>(
                    <button key={k} onClick={()=>setActiveTheme(k)} className={`h-14 w-14 rounded-full flex items-center justify-center ${THEMES[k].bg} ${activeTheme===k?'ring-4 ring-offset-2 scale-110 '+THEMES[k].border:''}`}>
                      {activeTheme===k&&<Check size={19} className="text-white"/>}
                    </button>
                  ))}
                </div>
              </section>
              <div className="h-px bg-slate-200 dark:bg-slate-800"/>
              <section className="flex justify-between items-center my-2">
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">Mode Gelap</h3>
                <label className="relative inline-flex cursor-pointer">
                  <input type="checkbox" className="sr-only peer" checked={darkMode} onChange={()=>setDarkMode(!darkMode)}/>
                  <div className="w-14 h-8 bg-slate-300 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white dark:bg-slate-900 after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-slate-800"/>
                </label>
              </section>
              <div className="h-px bg-slate-200 dark:bg-slate-800"/>
              <section>
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Crown size={14} className="text-amber-500"/> Akses Premium</h3>
                <div className={`p-6 rounded-3xl border-2 transition-all duration-500 ${isProMode?'bg-amber-50 border-amber-400':'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`}>
                  <div className="flex justify-between items-start mb-5">
                    <div>
                      <h4 className={`text-lg font-black ${isProMode?'text-amber-600':'text-slate-800 dark:text-slate-200'}`}>Klip Pro</h4>
                      <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">{isProMode?'Semua fitur aktif.':'Buka semua fitur premium.'}</p>
                    </div>
                    <label className="relative inline-flex cursor-pointer">
                      <input type="checkbox" className="sr-only peer" checked={isProMode} onChange={()=>setIsProMode(m=>!m)}/>
                      <div className="w-14 h-8 bg-slate-300 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white dark:bg-slate-900 after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-amber-500"/>
                    </label>
                  </div>
                  <ul className="space-y-2.5">
                    {['Ekstrak: Scanner + Simpan ke Brankas','Draf: Sensor Otomatis + Format WA','Hitung: Ekspor Template WhatsApp','Sandi: Mode Frasa + Riwayat Sandi','Brankas: Catatan Rahasia per Item'].map(f=>(
                      <li key={f} className="flex gap-2.5 items-center"><Check size={14} className={isProMode?'text-amber-500':'text-slate-300'}/><span className="text-sm font-semibold text-slate-700 dark:text-slate-300">{f}</span></li>
                    ))}
                  </ul>
                </div>
              </section>
            </div>
          </div>
        );
      };

      /* ════════════════════════════════════
         ROOT
      ═════════════════════════════════════ */
      return(
        <div className="w-full h-[100dvh] bg-[#FAFAFA] flex flex-col relative overflow-hidden sm:max-w-md sm:mx-auto sm:border-x sm:border-slate-200 dark:border-slate-700">

          {drawerOpen&&<div className="absolute inset-0 bg-slate-900/40 dark:bg-black/40 backdrop-blur-[2px] z-40" onClick={()=>snapDrawer(false)}/>}

          <div className="px-6 pt-10 pb-2 z-10 flex justify-between items-center bg-[#FAFAFA]/90 dark:bg-slate-950/90 backdrop-blur-md flex-shrink-0">
            <div className="flex items-center gap-2">
              <Scissors size={18} className="text-slate-900 dark:text-white stroke-[2.5]"/>
              <h1 className="text-xl font-black tracking-tight text-slate-900 dark:text-white">Klip.</h1>
            </div>
            <div className="flex items-center gap-2.5">
              {isProMode&&<div className="bg-amber-50 text-amber-600 px-2.5 py-1 rounded-full text-[10px] font-black tracking-widest uppercase flex items-center gap-1 border border-amber-200"><Crown size={10}/> Pro</div>}
              <button onClick={()=>setIsGlobalOpen(true)} className="h-8 w-8 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-600 dark:text-slate-400 active:scale-90"><Settings2 size={15}/></button>
            </div>
          </div>

          <main className="flex-1 overflow-y-auto px-6 hide-scrollbar relative z-0">
            {activeTab==='ekstrak'&&renderEkstrak()}
            {activeTab==='brankas'&&renderBrankas()}
            {activeTab==='draft'  &&renderDraft()}
            {activeTab==='hitung' &&renderTools()}
            {activeTab==='sandi'  &&renderSandi()}
          </main>

          {renderSmartDrawer()}
          {renderGlobal()}

          {/* Side Dial */}
          {isDialOpen&&<div className="absolute inset-0 bg-slate-900/5 z-20" onClick={()=>setIsDialOpen(false)}/>}
          <div className={`absolute right-0 top-1/2 -translate-y-1/2 z-30 transition-all duration-300 ${drawerOpen||isGlobalOpen?'opacity-0 pointer-events-none translate-x-8':'opacity-100'}`}>
            <div className={`relative bg-slate-900/95 backdrop-blur-lg shadow-[-12px_0_30px_rgba(0,0,0,0.2)] transition-all duration-500 ease-[cubic-bezier(0.2,0.8,0.2,1)] overflow-hidden ${isDialOpen?'w-24 h-[400px] rounded-l-[48px] border-y border-l border-slate-700/50':'w-12 h-28 rounded-l-[28px] cursor-pointer hover:w-14'}`}
              onClick={()=>!isDialOpen&&setIsDialOpen(true)}>
              {!isDialOpen&&(
                <>{<div className={`absolute left-2 top-1/2 -translate-y-1/2 w-1 h-9 ${th.bg} rounded-full`}/>}
                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-white/90">
                  {activeTab==='ekstrak'&&<Scan size={18}/>}{activeTab==='brankas'&&<CreditCard size={18}/>}
                  {activeTab==='draft'&&<Type size={18}/>}{activeTab==='hitung'&&<Calculator size={18}/>}
                  {activeTab==='sandi'&&<KeyRound size={18}/>}
                </div></>
              )}
              <div className={`absolute inset-0 transition-opacity duration-300 ${isDialOpen?'opacity-100':'opacity-0 pointer-events-none'}`}>
                <div className="absolute top-0 left-0 w-full h-10 bg-gradient-to-b from-slate-900 to-transparent z-10 pointer-events-none rounded-tl-[48px]"/>
                <div className="absolute bottom-0 left-0 w-full h-10 bg-gradient-to-t from-slate-900 to-transparent z-10 pointer-events-none rounded-bl-[48px]"/>
                <div className="h-full w-full overflow-y-auto snap-y snap-mandatory hide-scrollbar py-[55%] flex flex-col items-end px-4 gap-8">
                  {[{id:'ekstrak',icon:<Scan size={20}/>,label:'Ekstrak',pro:true},{id:'brankas',icon:<CreditCard size={20}/>,label:'Brankas',pro:false},{id:'draft',icon:<Type size={20}/>,label:'Draf',pro:false},{id:'hitung',icon:<Calculator size={20}/>,label:'Hitung',pro:false},{id:'sandi',icon:<KeyRound size={20}/>,label:'Sandi',pro:false}].map(({id,icon,label,pro})=>{
                    const locked=pro&&!isProMode;const active=activeTab===id;
                    return(
                      <button key={id} onClick={e=>{e.stopPropagation();if(locked){toast('Khusus Pro');return;}setActiveTab(id);setIsDialOpen(false);}} className={`relative snap-center flex flex-col items-center gap-1.5 w-16 ${active?'scale-110':'scale-90 opacity-60'}`}>
                        <div className={`h-14 w-14 rounded-full flex items-center justify-center shadow-md ${active?th.bg+' text-white '+th.glow:'bg-slate-800 text-slate-300'}`}>{locked?<Lock size={18} className="text-slate-500 dark:text-slate-400"/>:icon}</div>
                        <span className={`text-[9px] font-black uppercase tracking-wider ${active?th.dialText:'text-slate-500 dark:text-slate-400'}`}>{label}</span>
                        {pro&&!isProMode&&<Crown size={9} className="absolute -top-1 -right-1 text-amber-500"/>}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>

          {toastMsg&&(
            <div className="absolute top-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-2 slide-down z-[110]">
              <Check size={14} className="text-emerald-400"/>
              <span className="font-bold text-sm tracking-wide">{toastMsg}</span>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<KlipApp/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
