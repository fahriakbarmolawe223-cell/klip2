    /* ─── Vault Crypto (AES-GCM + PBKDF2) ────────── */
    async function deriveKey(pin) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']
      );
      const salt = enc.encode('klip-vault-salt-v1');
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false, ['encrypt', 'decrypt']
      );
    }

    async function encryptValue(plaintext, pin) {
      const key = await deriveKey(pin);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const enc = new TextEncoder();
      const encrypted = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv }, key, enc.encode(plaintext)
      );
      const combined = new Uint8Array(iv.byteLength + encrypted.byteLength);
      combined.set(iv, 0);
      combined.set(new Uint8Array(encrypted), iv.byteLength);
      return btoa(String.fromCharCode(...combined));
    }

    async function decryptValue(ciphertext, pin) {
      try {
        const key = await deriveKey(pin);
        const bytes = Uint8Array.from(atob(ciphertext), c => c.charCodeAt(0));
        const iv = bytes.slice(0, 12);
        const data = bytes.slice(12);
        const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
        return new TextDecoder().decode(dec);
      } catch { return null; }
    }

    async function hashPin(pin) {
      const enc = new TextEncoder();
      const hash = await crypto.subtle.digest('SHA-256', enc.encode(pin + 'klip-salt'));
      return btoa(String.fromCharCode(...new Uint8Array(hash)));
    }

    /* ─── Helpers ────────────────────────────────── */
    const generateQR = (text) => {
      const qr = qrcode(0, 'M');
      qr.addData(text);

    const fmt = (raw) => { const d=String(raw).replace(/\D/g,''); return d?parseInt(d,10).toLocaleString('id-ID'):''; };
    const parse = (s) => s.replace(/\./g,'').replace(/,/g,'').replace(/\D/g,'');

    const pwdStrength = (p) => {
      if(!p||p.length<4) return {score:0,label:'Sangat Lemah',color:'bg-red-400'};
      let s=0;
      if(p.length>=8)s++; if(p.length>=12)s++; if(p.length>=16)s++;
      if(/[A-Z]/.test(p))s++; if(/[a-z]/.test(p))s++;
      if(/\d/.test(p))s++; if(/[^A-Za-z0-9]/.test(p))s++;
      if(s<=2) return {score:Math.round(s/7*100),label:'Lemah',      color:'bg-red-400'};
      if(s<=4) return {score:Math.round(s/7*100),label:'Cukup',      color:'bg-amber-400'};
      if(s<=5) return {score:Math.round(s/7*100),label:'Kuat',       color:'bg-emerald-400'};
      return          {score:Math.round(s/7*100),label:'Sangat Kuat',color:'bg-emerald-500'};
    };

    /* ── Color Helpers ── */
    const hexToRgb = (hex) => {
      let h=hex.replace('#','');
      if(h.length===3) h=[...h].map(x=>x+x).join('');
      if(h.length!==6) return null;
      return { r:parseInt(h.slice(0,2),16), g:parseInt(h.slice(2,4),16), b:parseInt(h.slice(4,6),16) };
    };
    const rgbToHex = (r, g, b) => '#' + [r,g,b].map(x => Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2, '0')).join('');
    const rgbToHsl = (r, g, b) => {
      r/=255; g/=255; b/=255;
      const max=Math.max(r,g,b), min=Math.min(r,g,b);
      let h, s, l=(max+min)/2;
      if(max===min){ h=s=0; } else {
        const d=max-min; s=l>0.5 ? d/(2-max-min) : d/(max+min);
        switch(max){ case r: h=(g-b)/d+(g<b?6:0); break; case g: h=(b-r)/d+2; break; case b: h=(r-g)/d+4; break; default: h=0; } h/=6;
      }
      return { h:Math.round(h*360), s:Math.round(s*100), l:Math.round(l*100) };
    };
    const hslToRgb = (h, s, l) => {
      s/=100; l/=100; const a=s*Math.min(l,1-l);
      const f=(n, k=(n+h/30)%12) => l - a*Math.max(Math.min(k-3, 9-k, 1), -1);
      return { r:Math.round(f(0)*255), g:Math.round(f(8)*255), b:Math.round(f(4)*255) };
    };
    const parseColor = (str) => {
      const s = str.trim().toLowerCase();
      if(s.startsWith('#')) {
        const rgb = hexToRgb(s); return rgb ? { rgb, hex: s, hsl: rgbToHsl(rgb.r,rgb.g,rgb.b) } : null;
      }
      if(s.startsWith('rgb')) {
        const m = s.match(/\d+/g);
        if(m&&m.length>=3) {
          const rgb = { r:parseInt(m[0]), g:parseInt(m[1]), b:parseInt(m[2]) };
          return { rgb, hex: rgbToHex(rgb.r,rgb.g,rgb.b), hsl: rgbToHsl(rgb.r,rgb.g,rgb.b) };
        }
      }
      if(s.startsWith('hsl')) {
        const m = s.match(/\d+/g);
        if(m&&m.length>=3) {
          const hsl = { h:parseInt(m[0]), s:parseInt(m[1]), l:parseInt(m[2]) };
          const rgb = hslToRgb(hsl.h,hsl.s,hsl.l);
          return { rgb, hex: rgbToHex(rgb.r,rgb.g,rgb.b), hsl };
        }
      }
      const rgb = hexToRgb(s);
      if(rgb) return { rgb, hex: '#'+s, hsl: rgbToHsl(rgb.r,rgb.g,rgb.b) };
      return null;
    };
    const generatePalette = (baseHex) => {
      const parsed = parseColor(baseHex); if(!parsed) return null;
      const {h,s,l} = parsed.hsl;
      const t=(hue)=>hslToRgb((hue+360)%360,s,l);
      const toH=(hue)=>rgbToHex(t(hue).r,t(hue).g,t(hue).b);
      const analogus = [toH(h-30), baseHex, toH(h+30)];
      const triadik = [baseHex, toH(h+120), toH(h-120)];
      const komplementer = [baseHex, toH(h+180)];
      const tints = Array.from({length:5}, (_,i)=>rgbToHex(...Object.values(hslToRgb(h,s,Math.min(100,Math.round(l+(i+1)*15))))));
      const shades = Array.from({length:5}, (_,i)=>rgbToHex(...Object.values(hslToRgb(h,s,Math.max(0,Math.round(l-(i+1)*15))))));
      return { analogus, triadik, komplementer, tints, shades };
    };

    /* ── Local Storage Hook ── */
    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.error(error);
          return initialValue;
        }
      });
      const setValue = value => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.error(error);
        }
      };
      return [storedValue, setValue];
    }

            <p className="text-sm font-semibold text-slate-500 dark:text-slate-400 leading-relaxed mb-6">{t('eDesc')}</p>
            <div className="relative">
              <textarea placeholder="Tempel pesan, chat, email, notifikasi..." className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-2xl p-4 text-slate-800 dark:text-slate-200 focus:outline-none resize-none font-medium h-28 hide-scrollbar`} value={ekstrakText} onChange={e=>setEkstrakText(e.target.value)}/>
              {!ekstrakText&&<button onClick={async()=>{try{const t=await navigator.clipboard.readText();setEkstrakText(t);toast('Ditempel!');}catch{toast('Izin clipboard ditolak');}}} className={`absolute bottom-3 right-3 ${th.bg} text-white px-3 py-1.5 rounded-xl text-xs font-bold flex items-center gap-1.5 active:scale-95`}><FileText size={12}/> Paste</button>}
              {ekstrakText&&<button onClick={()=>{setEkstrakText('');setExtFilter('all');}} className="absolute top-3 right-3 bg-white dark:bg-slate-900/90 p-1.5 rounded-lg text-slate-400 active:scale-90"><X size={13}/></button>}
            </div>
            {ekstrakText.trim()&&totalFound>0&&(
              <div className="flex gap-2 overflow-x-auto hide-scrollbar">
                {[
                  ['all',     `Semua (${totalFound})`],
                  ['numbers', `Rekening (${cats.numbers.length})`],
                  ['phones',  `HP (${cats.phones.length})`],
                  ['prices',  `Harga (${cats.prices.length})`],
                  ['emails',  `Email (${cats.emails.length})`],
                  ['dates',   `Tanggal (${cats.dates.length})`],
                  ['links',   `Link (${cats.links.length})`],
                  ['cards',   `Kartu (${cats.cards.length})`],
                  ['coords',  `GPS (${cats.coords.length})`],
                  ['sosial',  `Sosial (${cats.sosial.length})`],
                ].map(([k,l])=>{
                  const cnt=k==='all'?totalFound:(cats[k]||[]).length;
                  if(k!=='all'&&cnt===0) return null;
                  return <button key={k} onClick={()=>setExtFilter(k)} className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap flex-shrink-0 border active:scale-95 ${extFilter===k?th.bg+' text-white border-transparent':'bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{l}</button>;
                })}
              </div>
            )}
            {ekstrakText.trim()&&(
              <div className="space-y-4">
                {totalFound===0&&<div className="text-center py-12 bg-slate-50 dark:bg-slate-800 border border-dashed border-slate-200 dark:border-slate-700 rounded-2xl"><Wand2 size={20} className="mx-auto mb-2 text-slate-300"/><p className="text-slate-400 text-sm">Tidak ada data terdeteksi</p></div>}
                {show('numbers')&&cats.numbers.length>0&&<div><div className="flex items-center justify-between mb-2"><h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><Hash size={11}/> Rekening/ID</h3><button onClick={()=>copy(cats.numbers.join('\n'),'Semua rekening')} className="text-xs text-slate-400 font-bold active:scale-95">Salin semua</button></div><div className="space-y-2">{cats.numbers.map((v,i)=><ECard key={i} icon={<CreditCard size={15} className={th.text}/>} text={v} cat="number"/>)}</div></div>}
                {show('phones')&&cats.phones.length>0&&<div><div className="flex items-center justify-between mb-2"><h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><Phone size={11}/> Telepon</h3><button onClick={()=>copy(cats.phones.join('\n'),'Semua telepon')} className="text-xs text-slate-400 font-bold active:scale-95">Salin semua</button></div><div className="space-y-2">{cats.phones.map((v,i)=><ECard key={i} icon={<Phone size={15} className="text-emerald-500"/>} text={v} cat="phone"/>)}</div></div>}
                {show('prices')&&cats.prices.length>0&&<div><div className="flex items-center justify-between mb-2"><h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Rp Harga</h3><button onClick={()=>copy(cats.prices.join('\n'),'Semua harga')} className="text-xs text-slate-400 font-bold active:scale-95">Salin semua</button></div><div className="space-y-2">{cats.prices.map((v,i)=><ECard key={i} icon={<Calculator size={15} className="text-amber-500"/>} text={v} cat="price"/>)}</div></div>}
                {show('emails')&&cats.emails.length>0&&<div><div className="flex items-center justify-between mb-2"><h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><Mail size={11}/> Email</h3><button onClick={()=>copy(cats.emails.join('\n'),'Semua email')} className="text-xs text-slate-400 font-bold active:scale-95">Salin semua</button></div><div className="space-y-2">{cats.emails.map((v,i)=><ECard key={i} icon={<Mail size={15} className="text-amber-500"/>} text={v} cat="email"/>)}</div></div>}
                {show('dates')&&cats.dates.length>0&&<div><h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1"><FileText size={11}/> Tanggal</h3><div className="space-y-2">{cats.dates.map((v,i)=><ECard key={i} icon={<FileText size={15} className="text-indigo-500"/>} text={v} cat="date"/>)}</div></div>}
                {show('links')&&cats.links.length>0&&<div><div className="flex items-center justify-between mb-2"><h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><LinkIcon size={11}/> Link</h3><button onClick={()=>copy(cats.links.join('\n'),'Semua link')} className="text-xs text-slate-400 font-bold active:scale-95">Salin semua</button></div><div className="space-y-2">{cats.links.map((v,i)=><ECard key={i} icon={<LinkIcon size={15} className="text-blue-500"/>} text={v} cat="link"/>)}</div></div>}
                {/* NEW: Kartu Kredit/Debit */}
                {show('cards')&&cats.cards.length>0&&(
                  <div>
                    <div className="flex items-center justify-between mb-2">
                      <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><CreditCard size={11}/> Kartu</h3>
                      <button onClick={()=>copy(cats.cards.join('\n'),'Semua kartu')} className="text-xs text-slate-400 font-bold active:scale-95">Salin semua</button>
                    </div>
                    <div className="space-y-2">{cats.cards.map((v,i)=>{
                      const brand = /^4/.test(v)?'Visa':/^5[1-5]/.test(v)?'Mastercard':/^3[47]/.test(v)?'Amex':'Kartu';
                      return <ECard key={i} icon={<CreditCard size={15} className="text-violet-500"/>} text={`${brand}: ${v.replace(/(\d{4})/g,'$1 ').trim()}`} cat="number"/>;
                    })}</div>
                  </div>
                )}
                {/* NEW: Koordinat GPS */}
                {show('coords')&&cats.coords.length>0&&(
                  <div>
                    <div className="flex items-center justify-between mb-2">
                      <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><MapPin size={11}/> Koordinat GPS</h3>
                      <button onClick={()=>copy(cats.coords.join('\n'),'Semua koordinat')} className="text-xs text-slate-400 font-bold active:scale-95">Salin semua</button>
                    </div>
                    <div className="space-y-2">{cats.coords.map((v,i)=>(
                      <ECard key={i} icon={<MapPin size={15} className="text-rose-500"/>} text={v} cat="coords"
                        extra={<a href={`https://maps.google.com/?q=${encodeURIComponent(v)}`} target="_blank" rel="noreferrer" className="h-9 w-9 bg-rose-50 rounded-lg flex items-center justify-center text-rose-500 active:scale-90"><MapPin size={13}/></a>}/>
                    ))}</div>
                  </div>
                )}
                {/* NEW: Hashtag & Mention */}
                {show('sosial')&&cats.sosial.length>0&&(
                  <div>
                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1"><Hash size={11}/> Sosial</h3>
                    {(ekstrakRes.hashtags||[]).length>0&&(
                      <div className="mb-3">
                        <p className="text-[0.625rem] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Hashtag</p>
                        <div className="flex flex-wrap gap-2">
                          {(ekstrakRes.hashtags||[]).map((v,i)=>(
                            <button key={i} onClick={()=>copy(v,'Hashtag')} className="px-3 py-1.5 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 rounded-full text-xs font-bold border border-indigo-200 dark:border-indigo-500/30 flex items-center gap-1 active:scale-95">
                              <Hash size={10}/> {v.slice(1)}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                    {(ekstrakRes.mentions||[]).length>0&&(
                      <div>
                        <p className="text-[0.625rem] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Mention</p>
                        <div className="flex flex-wrap gap-2">
                          {(ekstrakRes.mentions||[]).map((v,i)=>(
                            <button key={i} onClick={()=>copy(v,'Mention')} className="px-3 py-1.5 bg-sky-50 dark:bg-sky-900/20 text-sky-600 dark:text-sky-400 rounded-full text-xs font-bold border border-sky-200 dark:border-sky-500/30 flex items-center gap-1 active:scale-95">
                              <User size={10}/> {v.slice(1)}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
            {!isProMode && (ekstrakRes.cards?.length>0 || ekstrakRes.coords?.length>0 || (ekstrakRes.hashtags||[]).length>0 || (ekstrakRes.mentions||[]).length>0) && (
              <div className="p-4 rounded-2xl border bg-amber-50 dark:bg-amber-500/10 border-amber-300 dark:border-amber-500/30">
                <h4 className="text-sm font-bold text-amber-600 dark:text-amber-500 flex items-center gap-1.5"><Crown size={14}/> Fitur Pro Terdeteksi</h4>
                <p className="text-xs text-amber-600/80 dark:text-amber-500/80 mt-1 font-medium leading-relaxed">Kartu Kredit, GPS, atau Akun Sosial ditemukan dalam teks. Belum memiliki Pro? <span className="font-bold underline cursor-pointer" onClick={()=>setIsProMode(true)}>Aktifkan sekarang</span> untuk membuka akses ekstrak mahir.</p>
              </div>
            )}
          </div>
        );
      };


      /* ── Brankas ── */
      const renderBrankas = () => {
        /* Condition 1: PIN not set yet */
        if (!masterPinSet) {
          const handleSetup = async (e) => {
            e.preventDefault();
            if (pinInput.length < 4) { setPinError(tr('PIN minimal 4 digit','PIN must be at least 4 digits')); return; }
            if (pinInput !== pinConfirm) { setPinError(tr('PIN tidak cocok','PINs do not match')); return; }
            setPinError('');
            await setupPin(pinInput);
            setPinInput(''); setPinConfirm('');
            toast(tr('PIN berhasil dibuat!','PIN created!'));
          };
          return (
            <div className="fade-in pt-2 pb-48">
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab2')}.</h2>
              </div>
              <div className={`mt-6 p-6 rounded-3xl border ${th.border} bg-white dark:bg-slate-900 shadow-sm`}>
                <div className={`h-16 w-16 rounded-2xl ${th.bg} flex items-center justify-center mx-auto mb-5 shadow-lg`}>
                  <ShieldCheck size={32} className="text-white"/>
                </div>
                <h3 className="text-xl font-black text-slate-900 dark:text-white text-center mb-1">{tr('Amankan Brankas','Secure Your Vault')}</h3>
                <p className="text-sm text-slate-400 text-center mb-6">{tr('Buat PIN 4–6 digit untuk melindungi data sensitifmu','Create a 4–6 digit PIN to protect your sensitive data')}</p>
                <form onSubmit={handleSetup} className="space-y-3">
                  <div>
                    <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1 block">{tr('Buat PIN','Create PIN')}</label>
                    <input type="password" inputMode="numeric" maxLength={6} placeholder="••••••" className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-center text-2xl tracking-[0.5em] font-black outline-none`} value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,''))}/>
                  </div>
                  <div>
                    <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1 block">{tr('Konfirmasi PIN','Confirm PIN')}</label>
                    <input type="password" inputMode="numeric" maxLength={6} placeholder="••••••" className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-center text-2xl tracking-[0.5em] font-black outline-none`} value={pinConfirm} onChange={e=>setPinConfirm(e.target.value.replace(/\D/g,''))}/>
                  </div>
                  {pinError && <p className="text-rose-500 text-xs font-bold text-center">{pinError}</p>}
                  <button type="submit" className={`w-full ${th.bg} text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 active:scale-[0.98] mt-2`}>
                    <Lock size={15}/> {tr('Buat PIN & Amankan','Create PIN & Secure')}
                  </button>
                </form>
              </div>
              {vaultItems.length > 0 && (
                <p className="text-center text-xs text-slate-400 mt-4">{vaultItems.length} {tr('item akan dienkripsi setelah PIN dibuat','items will be encrypted after PIN is set')}</p>
              )}
            </div>
          );
        }

        /* Condition 2: PIN set, vault is locked */
        if (vaultLocked) {
          const handleUnlock = async (e) => {
            e.preventDefault();
            const ok = await unlockVault(pinInput);
            if (ok) { setPinInput(''); setPinError(''); }
            else { setPinError(tr('PIN salah, coba lagi','Wrong PIN, try again')); }
          };
          return (
            <div className="fade-in pt-2 pb-48">
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab2')}.</h2>
              </div>
              <div className="mt-10 flex flex-col items-center">
                <div className={`h-20 w-20 rounded-3xl ${th.bg} flex items-center justify-center shadow-xl mb-6`}>
                  <Lock size={36} className="text-white"/>
                </div>
                <h3 className="text-xl font-black text-slate-900 dark:text-white mb-1">{tr('Brankas Terkunci','Vault Locked')}</h3>
                <p className="text-sm text-slate-400 mb-8">{tr('Masukkan PIN untuk membuka','Enter PIN to unlock')}</p>
                <form onSubmit={handleUnlock} className="w-full space-y-3">
                  <input type="password" inputMode="numeric" maxLength={6} placeholder="••••••" autoFocus className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-2xl px-4 py-4 text-center text-3xl tracking-[0.6em] font-black outline-none`} value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,''))}/>
                  {pinError && <p className="text-rose-500 text-xs font-bold text-center">{pinError}</p>}
                  <button type="submit" className={`w-full ${th.bg} text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 active:scale-[0.98]`}>
                    <Unlock size={15}/> {tr('Buka Brankas','Unlock Vault')}
                  </button>
                </form>
              </div>
            </div>
          );
        }

        /* Condition 3: Vault unlocked — normal content */
        const sl=vaultSearch.toLowerCase();
        const filtered=vaultItems.filter(i=>vaultFilter==='all'||i.category===vaultFilter).filter(i=>{
          if (!sl) return true;
          const dispVal = getDisplayValue(i);
          return i.title.toLowerCase().includes(sl) || dispVal.toLowerCase().includes(sl);
        });
        const catBg={bank:th.bg,id:'bg-slate-800',address:'bg-slate-800',link:'bg-slate-800',color:'bg-gradient-to-br from-violet-500 to-pink-500'};
        return(
          <div className="fade-in space-y-4 pt-2">
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab2')}.</h2>
              <button onClick={lockVault} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 dark:bg-slate-800 rounded-full text-xs font-bold text-slate-500 dark:text-slate-400 active:scale-95">
                <Lock size={12}/> {tr('Kunci','Lock')}
              </button>
            </div>
            <div className="flex items-center gap-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl px-4 py-2.5 shadow-sm">
              <Search size={15} className="text-slate-400 flex-shrink-0"/>
              <input type="text" placeholder={t('bCari')} className="flex-1 bg-transparent outline-none text-sm font-medium text-slate-700 dark:text-slate-300 placeholder:text-slate-400" value={vaultSearch} onChange={e=>setVaultSearch(e.target.value)}/>
              {vaultSearch&&<button onClick={()=>setVaultSearch('')}><X size={13} className="text-slate-400"/></button>}
            </div>
            <div className="space-y-3 pb-48">
              {filtered.length===0&&(
                <div className="text-center py-14 border border-dashed border-slate-200 dark:border-slate-700 rounded-2xl">
                  <ShieldCheck size={22} className="mx-auto mb-2 text-slate-300"/>
                  <p className="text-slate-400 text-sm">{vaultSearch?'Tidak ditemukan':'Brankas kosong'}</p>
                </div>
              )}
              {filtered.map(item=>{
                const dispVal = getDisplayValue(item);
                const isRev=revealed[item.id]||!item.isPrivate;
                /* Color category card */
                if(item.category === 'color') {
                  const colorHexes = dispVal.match(/#[0-9a-fA-F]{6}/g) || [];
                  const hasGrad = dispVal.includes('linear-gradient');
                  const gradMatch = dispVal.match(/linear-gradient\(([^)]+)\)/);
                  const bgStyle = hasGrad && gradMatch ? {background: `linear-gradient(${gradMatch[1]})`} : colorHexes.length > 0 ? {background: `linear-gradient(135deg, ${colorHexes.slice(0,4).join(', ')})`} : {background: 'linear-gradient(135deg, #8b5cf6, #ec4899)'};
                  return (
                    <div key={item.id} className="relative rounded-2xl overflow-hidden shadow-lg transition-all group">
                      <div className="h-24 w-full" style={bgStyle}/>
                      <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 border-t-0 rounded-b-2xl p-4">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-3 flex-1 min-w-0">
                            <div className="h-10 w-10 rounded-full bg-gradient-to-br from-violet-500 to-pink-500 flex items-center justify-center text-white flex-shrink-0"><Palette size={16}/></div>
                            <div className="min-w-0 flex-1">
                              <div className="flex items-center gap-1.5 mb-0.5">
                                <p className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-wider truncate">{item.title}</p>
                                <span className="flex-shrink-0 text-[0.5rem] font-black bg-violet-100 dark:bg-violet-500/20 text-violet-600 dark:text-violet-400 px-1.5 py-0.5 rounded uppercase tracking-wide">Warna</span>
                              </div>
                              <div className="flex items-center gap-1.5">
                                {colorHexes.slice(0,6).map((c,i) => <div key={i} className="w-5 h-5 rounded-md border border-slate-200 dark:border-slate-700 shadow-sm" style={{backgroundColor:c}}/>)}
                                {colorHexes.length > 6 && <span className="text-[0.5625rem] text-slate-400 font-bold">+{colorHexes.length-6}</span>}
                              </div>
                            </div>
                          </div>
                          <div className="flex items-center gap-1.5 flex-shrink-0">
                            <button onClick={()=>copy(dispVal,item.title)} className={`h-9 w-9 rounded-full ${th.light} flex items-center justify-center ${th.text} active:scale-90`}><Copy size={14}/></button>
                            <button onClick={()=>setConfirmDel(item.id)} className="h-9 w-9 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400 active:scale-90"><Trash2 size={14}/></button>
                          </div>
                        </div>
                        {isProMode&&item.note&&<div className="mt-2.5 pt-2.5 border-t border-slate-100 dark:border-slate-800 flex items-start gap-1.5 text-slate-500 dark:text-slate-400"><MessageSquare size={11} className="mt-0.5 flex-shrink-0"/><p className="text-[0.625rem] font-medium leading-snug italic">{item.note}</p></div>}
                        {confirmDel===item.id&&(
                          <div className="mt-3 pt-3 border-t border-rose-100 flex items-center justify-between fade-in">
                            <p className="text-xs font-bold text-rose-500">Hapus item ini?</p>
                            <div className="flex gap-2">
                              <button onClick={()=>setConfirmDel(null)} className="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 rounded-lg text-xs font-bold text-slate-600 dark:text-slate-400 active:scale-95">Batal</button>
                              <button onClick={()=>{setVaultItems(vi=>vi.filter(i=>i.id!==item.id));setConfirmDel(null);toast('Dihapus');}} className="px-3 py-1.5 bg-rose-500 rounded-lg text-xs font-bold text-white active:scale-95">Hapus</button>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                }
                if(isProMode && item.category === 'bank') {
                  return (
                    <div key={item.id} className="relative rounded-2xl p-5 shadow-lg overflow-hidden flex flex-col justify-between h-40 group transition-all shrink-0" style={{background: `linear-gradient(135deg, ${th.hex} 0%, #000 100%)`}}>
                      <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 pointer-events-none"/>
                      <div className="flex justify-between items-start text-white relative z-10">
                        <div className="flex flex-col gap-1">
                          <div className="w-10 h-7 bg-amber-200/80 rounded flex items-center justify-center border border-amber-400/30"><Nfc size={16} className="text-amber-700/80"/></div>
                        </div>
                        <div className="flex items-center gap-2">
                          {item.isEncrypted && <Lock size={10} className="text-white/60"/>}
                          <p className="text-[0.625rem] font-black tracking-widest uppercase opacity-80">{item.title}</p>
                        </div>
                      </div>
                      <div className="relative z-10 text-white">
                        <div className="flex items-center gap-3 mb-1">
                          <p className={`font-mono text-xl font-black tracking-widest drop-shadow-md transition-all ${!isRev?'filter blur-[6px] opacity-70 select-none':''}`}>{isRev ? dispVal : '•••• •••• •••• ••••'}</p>
                          {item.isPrivate&&<button onClick={()=>setRevealed(p=>({...p,[item.id]:!p[item.id]}))} className="text-white/70 hover:text-white">{isRev?<EyeOff size={16}/>:<Eye size={16}/>}</button>}
                        </div>
                        <div className="flex justify-between items-end mt-2">
                           {item.note ? <p className="text-[0.625rem] opacity-80 w-2/3 truncate">{item.note}</p> : <div/>}
                           <div className="flex gap-2">
                             <button onClick={()=>setQrItem(item)} className="h-8 w-8 bg-white/20 rounded-full flex items-center justify-center text-white active:scale-90 backdrop-blur-sm"><QrCode size={12}/></button>
                             <button onClick={()=>copy(dispVal,item.title)} className="h-8 w-8 bg-white/20 rounded-full flex items-center justify-center text-white active:scale-90 backdrop-blur-sm"><Copy size={12}/></button>

                           </div>
                        </div>
                      </div>
                      {confirmDel===item.id&&(
                        <div className="absolute inset-x-0 bottom-0 p-3 bg-rose-500/95 backdrop-blur-md flex items-center justify-between fade-in z-20">
                          <p className="text-xs font-bold text-white">Hapus kartu?</p>
                          <div className="flex gap-2">
                            <button onClick={()=>setConfirmDel(null)} className="px-3 py-1.5 bg-black/20 rounded-lg text-xs font-bold text-white active:scale-95">Batal</button>
                            <button onClick={()=>{setVaultItems(vi=>vi.filter(i=>i.id!==item.id));setConfirmDel(null);toast('Dihapus');}} className="px-3 py-1.5 bg-white text-rose-600 rounded-lg text-xs font-bold active:scale-95">Hapus</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                }
                return(
                  <div key={item.id} className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-4 rounded-2xl shadow-sm">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-3 overflow-hidden flex-1 pr-2">
                        <div className={`h-10 w-10 rounded-full flex items-center justify-center text-white flex-shrink-0 ${catBg[item.category]||'bg-slate-800'}`}>
                          {item.category==='bank'&&<CreditCard size={16}/>}
                          {item.category==='id'&&<User size={16}/>}
                          {item.category==='address'&&<MapPin size={16}/>}
                          {item.category==='link'&&<LinkIcon size={16}/>}
                          {item.category==='color'&&<Palette size={16}/>}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-1.5 mb-0.5">
                            <p className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-wider truncate">{item.title}</p>
                            {!item.isEncrypted && <span className="flex-shrink-0 text-[0.5rem] font-black bg-orange-100 text-orange-500 px-1.5 py-0.5 rounded uppercase tracking-wide flex items-center gap-0.5"><ShieldOff size={7}/> Terbuka</span>}
                          </div>
                          <div className="flex items-center gap-2">
                            <p className={`font-mono font-bold text-slate-800 dark:text-slate-200 text-sm truncate transition-all ${!isRev?'filter blur-[5px] select-none opacity-40':''}`}>{dispVal}</p>
                            {item.isPrivate&&<button onClick={()=>setRevealed(p=>({...p,[item.id]:!p[item.id]}))} className="text-slate-400 flex-shrink-0">{isRev?<EyeOff size={12}/>:<Eye size={12}/>}</button>}
                          </div>
                        </div>
                      </div>
                      <div className="flex items-center gap-1.5 flex-shrink-0">
                        {isProMode&&<button onClick={()=>setQrItem(item)} className="h-9 w-9 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400 active:scale-90"><QrCode size={14}/></button>}
                        <button onClick={()=>copy(dispVal,item.title)} className={`h-9 w-9 rounded-full ${th.light} flex items-center justify-center ${th.text} active:scale-90`}><Copy size={14}/></button>
                        <button onClick={()=>setConfirmDel(item.id)} className="h-9 w-9 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400 active:scale-90"><Trash2 size={14}/></button>
                      </div>
                    </div>
                    {isProMode&&item.note&&<div className="mt-2.5 pt-2.5 border-t border-slate-100 dark:border-slate-800 flex items-start gap-1.5 text-slate-500 dark:text-slate-400"><MessageSquare size={11} className="mt-0.5 flex-shrink-0"/><p className="text-[0.625rem] font-medium leading-snug italic">{item.note}</p></div>}
                    {confirmDel===item.id&&(
                      <div className="mt-3 pt-3 border-t border-rose-100 flex items-center justify-between fade-in">
                        <p className="text-xs font-bold text-rose-500">Hapus item ini?</p>
                        <div className="flex gap-2">
                          <button onClick={()=>setConfirmDel(null)} className="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 rounded-lg text-xs font-bold text-slate-600 dark:text-slate-400 active:scale-95">Batal</button>
                          <button onClick={()=>{setVaultItems(vi=>vi.filter(i=>i.id!==item.id));setConfirmDel(null);toast('Dihapus');}} className="px-3 py-1.5 bg-rose-500 rounded-lg text-xs font-bold text-white active:scale-95">Hapus</button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

          </div>
        );
      };

      /* ── Draf ── */
      const renderDraft = () => (
        <div className="fade-in h-full flex flex-col pt-2 pb-44">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab3')}.</h2>
            <div className="flex items-center gap-1.5 text-xs font-bold text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full">
              <span>{wc} kata</span><span>·</span><span>{draftText.length} kar</span>
            </div>
          </div>
          <div className="flex-1 relative flex flex-col shadow-inner rounded-3xl overflow-hidden border border-slate-200 dark:border-slate-700 bg-[#fdfbf7] dark:bg-slate-900/50">
            <textarea placeholder="Tulis atau tempel teks di sini..." className="flex-1 w-full bg-transparent p-5 pb-16 text-slate-800 dark:text-slate-200 focus:outline-none resize-none font-medium leading-relaxed hide-scrollbar text-sm" value={draftText} onChange={e=>setDraftText(e.target.value)}/>
            {draftText.length>0&&(
              <div className="absolute bottom-4 right-4 flex gap-2">
                {isProMode&&<button onClick={()=>{if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();toast('Berhenti');}else{const u=new SpeechSynthesisUtterance(draftText);u.lang='id-ID';window.speechSynthesis.speak(u);toast('Membaca...');}}} className="h-10 w-10 bg-amber-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all"><Volume2 size={16}/></button>}
                <button onClick={()=>setDraftText('')} className="h-10 w-10 bg-slate-100 dark:bg-slate-800/90 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 active:scale-90 backdrop-blur-sm"><Trash2 size={16}/></button>
                <button onClick={()=>copy(draftText,'Draf')} className={`h-10 w-10 ${th.bg} text-white rounded-full flex items-center justify-center shadow-lg active:scale-90`}><Copy size={16}/></button>
              </div>
            )}
          </div>
        </div>
      );

      /* ── Hitung ── */
      const renderTools = () => (
        <div className="fade-in space-y-4 pb-48 pt-2">
          <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight mb-2">{t('tab4')}.</h2>

            {[['split',t('hPatungan')],['percent',t('hPersen')],['tip',t('hTips')],['cicilan',tr('Cicilan','Credit')],['hari',tr('Hari','Days')],['satuan',tr('Satuan','Units')]].map(([m,l])=>{
              const isProModeReq = ['cicilan','hari','satuan'].includes(m);
              const locked = isProModeReq && !isProMode;
              return(
              <button key={m} onClick={()=>{if(locked){toast('Fitur khusus Pro');return;}setCalcMode(m);}} className={`relative flex flex-shrink-0 px-5 py-2 rounded-xl text-xs font-bold transition-all duration-300 transform snap-center items-center justify-center gap-1.5 ${calcMode===m?'bg-white dark:bg-slate-900 shadow-md text-slate-900 dark:text-white scale-100':'text-slate-500 dark:text-slate-400 scale-95 opacity-80 hover:bg-slate-200/50 dark:hover:bg-slate-700/50'}`}>
                {locked&&<Crown size={12} className="text-amber-400"/>} {l}
              </button>
            )})}
          </div>

          {calcMode==='split'&&(
            <>
              <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4">
                <div>
                  <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Total Bon (Rp)</label>
                  <div className={`flex items-center ${th.light} border border-slate-200 dark:border-slate-700 rounded-2xl px-4 focus-within:border-slate-400`}>
                    <span className="text-slate-400 font-bold text-sm mr-1">Rp</span>
                    <input type="text" inputMode="numeric" className="flex-1 bg-transparent py-3.5 text-xl font-black outline-none" placeholder="0" value={billAmt} onChange={e=>{const r=parse(e.target.value);setBillAmt(r?fmt(r):'');}}/>
                  </div>
                </div>
                <div className="grid grid-cols-3 gap-3">
                  {[['Pajak %',taxPct,setTaxPct],['Servis %',svcPct,setSvcPct],['Tip %',tipPct,setTipPct]].map(([l,v,s])=>(
                    <div key={l}><label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{l}</label><input type="text" inputMode="decimal" className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 px-3 font-bold outline-none text-center`} value={v} onChange={e=>s(e.target.value.replace(/[^0-9.]/g,''))}/></div>
                  ))}
                </div>
                {base>0&&(disc>0||taxA>0||svcA>0||tipA>0)&&(
                  <div className="bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-800 rounded-xl px-4 py-3 space-y-1.5 text-xs font-medium text-slate-500 dark:text-slate-400">
                    {disc>0&&<div className="flex justify-between"><span>Diskon</span><span className="text-emerald-600">− Rp {Math.round(disc).toLocaleString('id-ID')}</span></div>}
                    {taxA>0&&<div className="flex justify-between"><span>Pajak {taxPct}%</span><span>+ Rp {Math.round(taxA).toLocaleString('id-ID')}</span></div>}
                    {svcA>0&&<div className="flex justify-between"><span>Servis {svcPct}%</span><span>+ Rp {Math.round(svcA).toLocaleString('id-ID')}</span></div>}
                    {tipA>0&&<div className="flex justify-between"><span>Tip {tipPct}%</span><span>+ Rp {Math.round(tipA).toLocaleString('id-ID')}</span></div>}
                    <div className="flex justify-between border-t border-slate-200 dark:border-slate-700 pt-1.5 font-bold text-slate-700 dark:text-slate-300"><span>Total</span><span>Rp {Math.round(total).toLocaleString('id-ID')}</span></div>
                  </div>
                )}
              </div>
              <div className={`${th.bg} text-white rounded-3xl p-5 shadow-xl transition-colors duration-500`}>

                <div className="flex items-center gap-3 border-t border-white/20 pt-4">
                  <button onClick={()=>setPplCnt(c=>String(Math.max(1,Number(c)-1)))} className="h-8 w-8 bg-black/20 rounded-full font-black text-xl flex items-center justify-center active:scale-90 leading-none">−</button>

                  <span className="font-bold bg-black/20 px-3 py-1.5 rounded-xl text-sm min-w-[60px] text-center">{pplCnt} Org</span>
                </div>
              </div>
            </>
          )}

          {calcMode==='percent'&&(
            <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4">

              <div>
                <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Nilai (Rp)', 'Value (Rp)')}</label>
                <div className={`flex items-center ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4`}>
                  <span className="text-slate-400 text-sm mr-1 font-bold">Rp</span>
                  <input type="text" inputMode="numeric" className="flex-1 bg-transparent py-3 font-bold outline-none" placeholder="0" value={pctVal} onChange={e=>{const r=parse(e.target.value);setPctVal(r?fmt(r):'');}}/>
                </div>
              </div>
              <div>
                <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Persen (%)', 'Percent (%)')}</label>
                <input type="text" inputMode="decimal" className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl py-3 px-4 font-bold outline-none`} placeholder="0" value={pctPct} onChange={e=>setPctPct(e.target.value.replace(/[^0-9.]/g,''))}/>
              </div>
              {pctRes>0&&(
                <div className={`${th.bg} text-white rounded-2xl p-4`}>
                  <p className="text-white/60 text-xs font-bold uppercase tracking-widest mb-1">{pctPct}% dari Rp {pctVal}</p>
                  <div className="flex items-center justify-between">
                    <p className="text-3xl font-black">Rp {Math.round(pctRes).toLocaleString('id-ID')}</p>
                    <button onClick={()=>copy(`Rp ${Math.round(pctRes).toLocaleString('id-ID')}`,'Hasil')} className="h-9 w-9 bg-white dark:bg-slate-900/20 rounded-full flex items-center justify-center active:scale-90"><Copy size={15}/></button>
                  </div>
                </div>
              )}
              <div className="grid grid-cols-3 gap-2">
                {['10','15','20','25','50','75'].map(p=>(
                  <button key={p} onClick={()=>setPctPct(p)} className={`py-2 rounded-xl text-sm font-bold border active:scale-95 ${pctPct===p?th.bg+' text-white border-transparent':'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{p}%</button>
                ))}
              </div>
            </div>
          )}

          {calcMode==='tip'&&(
            <div className="space-y-4">
              <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4">
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">{tr('Kalkulator Tips', 'Tips Calculator')}</h3>
                <div>
                  <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Total Tagihan (Rp)', 'Total Bill (Rp)')}</label>
                  <div className={`flex items-center ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4`}>
                    <span className="text-slate-400 text-sm mr-1 font-bold">Rp</span>
                    <input type="text" inputMode="numeric" className="flex-1 bg-transparent py-3 font-bold outline-none" placeholder="0" value={billAmt} onChange={e=>{const r=parse(e.target.value);setBillAmt(r?fmt(r):'');}}/>
                  </div>
                </div>
                <div>
                  <div className="flex justify-between mb-2">
                    <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest">Tips: {tipPct}%</label>
                    <span className="text-xs font-bold text-slate-500 dark:text-slate-400">Rp {Math.round(tipA).toLocaleString('id-ID')}</span>
                  </div>
                  <input type="range" min="0" max="30" value={tipPct} onChange={e=>setTipPct(e.target.value)} className="w-full" style={{accentColor:th.hex}}/>
                </div>
                <div className="grid grid-cols-4 gap-2">
                  {['5','10','15','20'].map(p=><button key={p} onClick={()=>setTipPct(p)} className={`py-2 rounded-xl text-sm font-bold border active:scale-95 ${tipPct===p?th.bg+' text-white border-transparent':'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{p}%</button>)}
                </div>
              </div>
              {base>0&&(
                <div className={`${th.bg} text-white rounded-3xl p-5 shadow-xl`}>
                  <div className="space-y-2 mb-4">
                    <div className="flex justify-between text-sm text-white/70"><span>Tagihan</span><span>Rp {base.toLocaleString('id-ID')}</span></div>
                    <div className="flex justify-between text-sm text-white/70"><span>Tips ({tipPct}%)</span><span>Rp {Math.round(tipA).toLocaleString('id-ID')}</span></div>
                    <div className="flex justify-between font-black text-lg border-t border-white/20 pt-2"><span>Total</span><span>Rp {Math.round(base+tipA).toLocaleString('id-ID')}</span></div>
                  </div>
                  <button onClick={()=>copy(`Total (termasuk tips ${tipPct}%): Rp ${Math.round(base+tipA).toLocaleString('id-ID')}`,'Total')} className="w-full bg-white dark:bg-slate-900/20 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95"><Copy size={14}/> Salin Total</button>
                </div>
              )}
            </div>
          )}

          {calcMode==='cicilan'&&(
            <div className="space-y-4">
              <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4">
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">{tr('Kalkulator Cicilan', 'Credit Calculator')}</h3>
                <div>
                  <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Harga Barang (Rp)','Price (Rp)')}</label>
                  <div className={`flex items-center ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4 focus-within:border-slate-400`}>
                    <span className="text-slate-400 font-bold text-sm mr-1">Rp</span>
                    <input type="text" inputMode="numeric" className="flex-1 bg-transparent py-3 font-bold outline-none" placeholder="0" value={cicilanHarga} onChange={e=>{const r=parse(e.target.value);setCicilanHarga(r?fmt(r):'');}}/>
                  </div>
                </div>
                <div>
                  <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Uang Muka / DP (Rp)','Down Payment (Rp)')}</label>
                  <div className={`flex items-center ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4 focus-within:border-slate-400`}>
                    <span className="text-slate-400 font-bold text-sm mr-1">Rp</span>
                    <input type="text" inputMode="numeric" className="flex-1 bg-transparent py-3 font-bold outline-none" placeholder="0" value={cicilanDP} onChange={e=>{const r=parse(e.target.value);setCicilanDP(r?fmt(r):'');}}/>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Bunga/Bulan (%)','Interest/Month (%)')}</label>
                    <input type="text" inputMode="decimal" className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl py-3 px-3 font-bold outline-none text-center`} placeholder="1.5" value={cicilanBunga} onChange={e=>setCicilanBunga(e.target.value.replace(/[^0-9.]/g,''))}/>
                  </div>
                  <div>
                    <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Tenor (Bulan)','Tenor (Months)')}</label>
                    <input type="text" inputMode="numeric" className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl py-3 px-3 font-bold outline-none text-center`} placeholder="12" value={cicilanTenor} onChange={e=>setCicilanTenor(e.target.value.replace(/\D/g,''))}/>
                  </div>
                </div>
                <div className="grid grid-cols-6 gap-1 pt-2">
                  {['3','6','12','18','24','36'].map(t=>(
                    <button key={t} onClick={()=>setCicilanTenor(t)} className={`py-2 rounded-lg text-xs font-bold border active:scale-95 ${cicilanTenor===t?th.bg+' text-white border-transparent':'bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{t}</button>
                  ))}
                </div>
              </div>
              {pokokPinjaman>0&&(
                <div className={`${th.bg} text-white rounded-3xl p-5 shadow-xl`}>
                  <p className="text-white/60 text-xs font-bold uppercase tracking-widest mb-1">{tr('Cicilan per Bulan','Monthly Installment')}</p>
                  <h3 className="text-3xl font-black tracking-tight mb-5">Rp {Math.round(cicilanPerBulan).toLocaleString('id-ID')}</h3>
                  <div className="space-y-2 mb-4">
                    <div className="flex justify-between text-sm text-white/70"><span>{tr('Pokok Pinjaman','Principal')}</span><span>Rp {pokokPinjaman.toLocaleString('id-ID')}</span></div>
                    <div className="flex justify-between text-sm text-white/70"><span>{tr('Total Bunga','Total Interest')}</span><span>Rp {Math.round(totalBunga).toLocaleString('id-ID')}</span></div>
                    <div className="flex justify-between font-black text-lg border-t border-white/20 pt-2 flex-wrap text-right"><span className="text-left">{tr('Total Bayar','Total Payment')}</span><span>Rp {Math.round(totalBayar).toLocaleString('id-ID')}</span></div>
                  </div>
                  <button onClick={()=>copy(`Cicilan ${cicilanTenor} bln: Rp ${Math.round(cicilanPerBulan).toLocaleString('id-ID')}/bln`,'Cicilan')} className="w-full bg-white dark:bg-slate-900/20 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95"><Copy size={14}/> {tr('Salin Cicilan','Copy Installment')}</button>
                </div>
              )}
            </div>
          )}

          {calcMode==='hari'&&(
            <div className="space-y-4">
              <div className="flex bg-slate-100 dark:bg-slate-800 rounded-2xl p-1 gap-1">
                <button onClick={()=>setHariMode('countdown')} className={`flex-1 py-1.5 rounded-xl text-xs font-bold transition-all ${hariMode==='countdown'?'bg-white dark:bg-slate-900 shadow-sm text-slate-900 dark:text-white':'text-slate-500 dark:text-slate-400'}`}>{tr('Hitung Mundur','Countdown')}</button>
                <button onClick={()=>setHariMode('between')} className={`flex-1 py-1.5 rounded-xl text-xs font-bold transition-all ${hariMode==='between'?'bg-white dark:bg-slate-900 shadow-sm text-slate-900 dark:text-white':'text-slate-500 dark:text-slate-400'}`}>{tr('Selisih Tanggal','Date Diff')}</button>

              <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4">

                  <>
                    <div>
                      <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Tanggal Target','Target Date')}</label>

                    </div>
                    <div>
                      <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Label (Opsional)','Label (Optional)')}</label>
                      <input type="text" placeholder={tr("Ultah, Lebaran, dll.","Birthday, Holiday, etc.")} className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl py-3 px-4 font-bold outline-none`} value={hariLabel} onChange={e=>setHariLabel(e.target.value)}/>
                    </div>
                  </>
                ) : (
                  <>
                    <div>
                      <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Tanggal Mulai','Start Date')}</label>
                      <input type="date" className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl py-3 px-4 font-bold outline-none text-slate-700 dark:text-slate-300`} value={hariFrom} onChange={e=>setHariFrom(e.target.value)}/>
                    </div>
                    <div>
                      <label className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">{tr('Tanggal Berakhir','End Date')}</label>
                      <input type="date" className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl py-3 px-4 font-bold outline-none text-slate-700 dark:text-slate-300`} value={hariTo} onChange={e=>setHariTo(e.target.value)}/>
                    </div>
                  </>

              </div>

              {((hariMode==='countdown' && hariTarget) || (hariMode==='between' && hariFrom && hariTo)) && (
                <div className={`${th.bg} text-white rounded-3xl p-5 shadow-xl`}>
                  {hariMode==='countdown' ? (
                    <div className="text-center py-2">
                       {hariLabel && <p className="text-white/80 font-bold mb-2 uppercase tracking-wide">{hariLabel}</p>}
                       {daysCount === 0 ? (
                         <h3 className="text-5xl font-black tracking-tight mb-2">Hari Ini!</h3>
                       ) : (
                         <>
                           <h3 className="text-6xl font-black tracking-tight mb-1">{Math.abs(daysCount)}</h3>
                           <p className="text-white/80 font-bold text-lg mb-4">{daysText}</p>
                           <div className="inline-block bg-black/20 rounded-full px-4 py-1.5 text-sm font-bold text-white/90">
                             ≈ {weeksText}
                           </div>
                         </>
                       )}
                    </div>
                  ) : (
                    <div className="text-center py-2">
                       <p className="text-white/60 text-xs font-bold uppercase tracking-widest mb-2">{tr('Total Hari','Total Days')}</p>
                       <h3 className="text-6xl font-black tracking-tight mb-4">{daysCount}</h3>
                       <div className="inline-block bg-black/20 rounded-full px-4 py-1.5 text-sm font-bold text-white/90">
                         ≈ {weeksText}
                       </div>
                    </div>
                  )}
                  <button onClick={()=>copy(`${hariMode==='countdown'? (hariLabel?hariLabel+': ':'') + Math.abs(daysCount) + ' ' + daysText : daysCount + ' Hari'}`,'Hasil')} className="w-full mt-5 bg-white dark:bg-slate-900/20 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95"><Copy size={14}/> {tr('Salin Angka','Copy Result')}</button>
                </div>
              )}
            </div>
          )}

          {calcMode==='satuan'&&(
            <div className="space-y-4">
              <div className="flex bg-slate-100 dark:bg-slate-800 rounded-2xl p-1 gap-1 overflow-x-auto hide-scrollbar whitespace-nowrap scroll-smooth snap-x snap-mandatory">
                {Object.entries(SATUAN).map(([k, v]) => (
                  <button key={k} onClick={()=>{setSatuanKat(k);setSatuanFrom(v.units[0]);setSatuanTo(v.units[1]);setSatuanInput('');}} className={`flex-shrink-0 px-4 py-1.5 rounded-xl text-[0.625rem] font-bold uppercase tracking-wider transition-all duration-300 transform snap-center ${satuanKat===k?'bg-white dark:bg-slate-900 shadow-sm text-slate-900 dark:text-white scale-100':'text-slate-500 dark:text-slate-400 scale-95 opacity-80 hover:bg-slate-200/50 dark:hover:bg-slate-700/50'}`}>{v.label}</button>
                ))}
              </div>

              <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5 shadow-sm space-y-4">
                <div className="flex items-center gap-2">
                  <div className={`flex-1 flex flex-col items-center justify-center p-3 sm:p-4 rounded-2xl border-2 transition-all ${satuanInput?th.border:'border-slate-100 dark:border-slate-800'} bg-slate-50 dark:bg-slate-800/50 relative`}>
                    <input type="text" inputMode="decimal" className="w-full bg-transparent text-center text-2xl sm:text-3xl font-black outline-none mb-2" placeholder="0" value={satuanInput} onChange={e=>setSatuanInput(e.target.value.replace(/[^0-9.-]/g,''))} />
                    <select className="bg-transparent text-[0.6875rem] sm:text-xs font-bold text-slate-500 dark:text-slate-400 outline-none cursor-pointer appearance-none text-center" value={satuanFrom} onChange={e=>setSatuanFrom(e.target.value)}>
                      {SATUAN[satuanKat].units.map(u=><option key={u} value={u}>{u}</option>)}
                    </select>
                  </div>

                  <button onClick={()=>{const t=satuanFrom;setSatuanFrom(satuanTo);setSatuanTo(t);}} className="h-10 w-10 flex-shrink-0 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-400 active:scale-90 hover:text-slate-600 transition-colors"><ArrowRightLeft size={16}/></button>

                  <div className={`flex-1 flex flex-col items-center justify-center p-3 sm:p-4 rounded-2xl text-white ${satuanResult?th.bg+' shadow-lg grayscale-0':'bg-slate-200 dark:bg-slate-700 grayscale'} transition-all relative`}>
                    <p className="w-full text-center text-2xl sm:text-3xl font-black mb-2 truncate" title={satuanResult||'0'}>{satuanResult||'0'}</p>
                    <select className="bg-transparent text-[0.6875rem] sm:text-xs font-bold opacity-80 outline-none cursor-pointer appearance-none text-center" value={satuanTo} onChange={e=>setSatuanTo(e.target.value)}>
                      {SATUAN[satuanKat].units.map(u=><option key={u} value={u}>{u}</option>)}
                    </select>
                  </div>
                </div>

                {satuanResult&&(
                  <button onClick={()=>copy(`${satuanInput} ${satuanFrom} = ${satuanResult} ${satuanTo}`,'Konversi')} className={`w-full ${th.light} py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-all text-slate-700 dark:text-slate-200`}><Copy size={14}/> {tr('Salin Konversi','Copy Result')}</button>
                )}
              </div>
            </div>
          )}
        </div>
      );

      /* ── Sandi ── */
      const renderSandi = () => {
        const str=pwdStrength(password);
        return(
          <div className="fade-in space-y-4 pb-48 pt-2">
            <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight mb-2">{t('tab5')}.</h2>
            <div className="flex bg-slate-100 dark:bg-slate-800 rounded-2xl p-1 gap-1">
              <button onClick={()=>setSandiMode('pwd')} className={`flex-1 py-2 rounded-xl text-xs font-bold ${sandiMode==='pwd'?'bg-white dark:bg-slate-900 shadow-sm text-slate-900 dark:text-white':'text-slate-500 dark:text-slate-400'}`}>Password</button>
              <button onClick={()=>setSandiMode('pin')} className={`flex-1 py-2 rounded-xl text-xs font-bold ${sandiMode==='pin'?'bg-white dark:bg-slate-900 shadow-sm text-slate-900 dark:text-white':'text-slate-500 dark:text-slate-400'}`}>PIN</button>
            </div>
            <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-5 shadow-sm">
              <p className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest mb-3">{tr('Sandi Dihasilkan', 'Generated Password')}</p>
              <div className={`bg-slate-50 dark:bg-slate-800 px-4 py-4 rounded-2xl mb-3 font-mono font-medium text-center border border-slate-200 dark:border-slate-700 relative min-h-[64px] flex items-center justify-center break-all ${sandiMode==='pin'?'text-3xl tracking-[0.3em]':'text-lg'} ${isProMode&&passph?th.text:'text-slate-800 dark:text-slate-200'}`}>
                {showPwd?password:(sandiMode==='pin'?'●'.repeat(password.length):'●'.repeat(Math.min(password.length,20)))}
                <button onClick={()=>setShowPwd(s=>!s)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 p-1">{showPwd?<EyeOff size={14}/>:<Eye size={14}/>}</button>
              </div>
              {sandiMode==='pwd'&&password&&(
                <div className="mb-4">
                  <div className="flex justify-between mb-1">
                    <span className="text-[0.625rem] font-bold text-slate-400 uppercase tracking-widest">{tr('Kekuatan','Strength')}</span>
                    <span className="text-[0.625rem] font-bold text-slate-600 dark:text-slate-400">{tr(str.label, str.label.replace('Sangat Lemah','Very Weak').replace('Lemah','Weak').replace('Cukup','Fair').replace('Kuat','Strong').replace('Sangat Kuat','Very Strong'))}</span>
                  </div>
                  <div className="h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden"><div className={`h-full rounded-full strength-bar ${str.color}`} style={{width:`${str.score}%`}}/></div>
                </div>
              )}
              <div className="flex gap-2.5">
                <button onClick={generatePassword} className="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95"><Shuffle size={15}/> {tr('Acak', 'Shuffle')}</button>
                <button onClick={()=>copy(password,'Sandi')} className={`flex-1 ${th.bg} text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 shadow-md`}><Copy size={15}/> {tr('Salin', 'Copy')}</button>
              </div>
              {isProMode && sandiMode==='pwd' && !passph && password.length <= 16 && (
                <div className="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                  <p className="text-[0.625rem] font-bold text-amber-500 uppercase tracking-widest mb-2 flex items-center gap-1"><Crown size={11}/> Phonetic NATO</p>
                  <div className="flex flex-wrap gap-1.5">
                    {password.split('').map((c,i)=>{
                      const nato = {a:'Alpha',b:'Bravo',c:'Charlie',d:'Delta',e:'Echo',f:'Foxtrot',g:'Golf',h:'Hotel',i:'India',j:'Juliett',k:'Kilo',l:'Lima',m:'Mike',n:'November',o:'Oscar',p:'Papa',q:'Quebec',r:'Romeo',s:'Sierra',t:'Tango',u:'Uniform',v:'Victor',w:'Whiskey',x:'X-ray',y:'Yankee',z:'Zulu',0:'Zero',1:'One',2:'Two',3:'Three',4:'Four',5:'Five',6:'Six',7:'Seven',8:'Eight',9:'Nine'};
                      const lc = c.toLowerCase();
                      const n = nato[lc] || c;
                      const isUp = c !== lc && /[a-zA-Z]/.test(c);
                      return <span key={i} className="px-2 py-1 bg-amber-50 dark:bg-amber-500/10 text-[0.625rem] font-bold text-amber-700 dark:text-amber-500 rounded border border-amber-200 dark:border-amber-500/20">{isUp?'⇧ '+n:n}</span>;
                    })}
                  </div>
                </div>
              )}
            </div>
            {sandiMode==='pin'&&(
              <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl p-4 shadow-sm">
                <div className="flex justify-between mb-2"><p className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Digit PIN</p><span className="font-black text-slate-900 dark:text-white">{pinLen}</span></div>
                <input type="range" min="4" max="8" value={pinLen} onChange={e=>setPinLen(Number(e.target.value))} className="w-full" style={{accentColor:th.hex}}/>
                <div className="flex justify-between text-[0.625rem] text-slate-400 mt-1"><span>4</span><span>8</span></div>
              </div>
            )}
            {isProMode&&pwdHist.length>0&&(
              <div className="bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-500/20 rounded-2xl p-4">
                <h3 className="text-xs font-bold text-amber-600 uppercase tracking-widest mb-3 flex items-center gap-1"><History size={11}/> <Crown size={11}/> Riwayat</h3>
                <div className="space-y-2">
                  {pwdHist.slice(1).map((p,i)=>(
                    <div key={i} className="flex items-center justify-between gap-2 bg-white dark:bg-slate-900/60 rounded-lg px-3 py-2">
                      <p className="font-mono text-xs text-slate-600 dark:text-slate-400 truncate flex-1">{showPwd?p:'●'.repeat(Math.min(p.length,16))}</p>
                      <button onClick={()=>copy(p,'Sandi lama')} className="text-amber-600 flex-shrink-0 active:scale-90"><Copy size={12}/></button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      };

      /* ════════════════════════════════════
         DRAWER CONTENT
      ═════════════════════════════════════ */
      const renderDrawerContent = () => {
        if(activeTab==='ekstrak') return(
          <div className="space-y-4 pt-1">
            <label className="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer">
              <div><p className="font-bold text-slate-700 dark:text-slate-300 text-sm">{tr('Rapikan Nomor Telepon', 'Format Phone Numbers')}</p><p className="text-[0.625rem] text-slate-400 mt-0.5">{tr('Hapus spasi dan tanda hubung', 'Remove spaces and dashes')}</p></div>
              <div className={`w-11 h-6 rounded-full relative flex-shrink-0 cursor-pointer transition-colors ${autoClean ? th.toggleOn : 'bg-slate-200 dark:bg-slate-700'}`} onClick={()=>setAutoClean(a=>!a)}><div className={`w-4 h-4 rounded-full absolute top-1 bg-white transition-transform shadow-[0_1px_3px_rgba(0,0,0,0.15)] ${autoClean?'translate-x-6':'translate-x-1'}`}/></div>
            </label>
            {isProMode&&extFilter==='all'&&(Object.values(ekstrakRes).reduce((s,a)=>s+a.length,0))>0&&(
              <div className="bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-500/20 p-4 rounded-xl space-y-2">
                <p className="text-xs font-bold text-amber-600 uppercase tracking-widest mb-2.5 flex items-center gap-1"><Crown size={11}/> {tr('Fitur Pro Ekstrak', 'Extract Pro Features')}</p>
                <button onClick={()=>{[...ekstrakRes.numbers,...ekstrakRes.phones].slice(0,10).forEach((v,i)=>setTimeout(()=>saveToVault(v,'number'),i*60));snapDrawer(false);}} disabled={ekstrakRes.numbers.length+ekstrakRes.phones.length===0} className="w-full bg-amber-500 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 disabled:opacity-40"><Plus size={14}/> {tr('Simpan Rekening & HP ke Brankas', 'Save Numbers To Vault')}</button>
                <button onClick={()=>{
                  const total = Object.values(ekstrakRes).reduce((s,a)=>s+a.length,0);
                  if(total===0) return;
                  let csv="Kategori,Data\n";
                  Object.entries(ekstrakRes).forEach(([k,arr])=>{ arr.forEach(v=>csv+=`${k},"${v}"\n`) });
                  copy(csv, 'Data CSV');
                  snapDrawer(false);
                }} disabled={Object.values(ekstrakRes).reduce((s,a)=>s+a.length,0)===0} className="w-full bg-slate-900 dark:bg-slate-800 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 disabled:opacity-40"><FileSpreadsheet size={14}/> {tr('Ekspor Data ke Format CSV', 'Export to CSV')}</button>
              </div>
            )}
            <button onClick={()=>{setEkstrakText('');setEkstrakRes({phones:[],links:[],emails:[],numbers:[],prices:[],dates:[]});setExtFilter('all');snapDrawer(false);}} className="w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 active:scale-95"><Trash2 size={15}/> {tr('Bersihkan Semua', 'Clean All')}</button>
          </div>
        );

        if(activeTab==='brankas') {
          if (!masterPinSet || vaultLocked) return (
            <div className="pt-6 text-center">
              <div className={`h-12 w-12 rounded-2xl ${th.bg} flex items-center justify-center mx-auto mb-3 opacity-80`}><Lock size={22} className="text-white"/></div>
              <p className="text-sm font-bold text-slate-500 dark:text-slate-400">{!masterPinSet ? tr('Buat PIN terlebih dahulu','Create a PIN first') : tr('Buka brankas untuk menambah item','Unlock vault to add items')}</p>
            </div>
          );
          return (
            <form onSubmit={addVault} className="space-y-3 pt-1">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">{tr('Tambah Data Baru', 'Add New Item')}</h3>
              <input type="text" placeholder={tr("Judul (Misal: Rekening Utama)", "Title (e.g. Main Account)")} required className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none text-sm font-bold`} value={newTitle} onChange={e=>setNewTitle(e.target.value)}/>
              <input type="text" placeholder={tr("Nilai / Nomor / Link", "Value / Number / Link")} required className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none text-sm font-mono`} value={newValue} onChange={e=>setNewValue(e.target.value)}/>
              {isProMode&&<div className="relative"><Crown size={10} className="absolute top-3 right-3 text-amber-500"/><textarea placeholder={tr("Catatan opsional...", "Optional notes...")} className="w-full bg-amber-50/60 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-500/20 rounded-xl px-4 py-3 outline-none text-sm dark:text-amber-100 dark:placeholder-amber-500/50 resize-none h-14" value={newNote} onChange={e=>setNewNote(e.target.value)}/></div>}
              <div className="grid grid-cols-2 gap-3">
                <select className="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-3 outline-none text-sm font-bold text-slate-700 dark:text-slate-300" value={newCat} onChange={e=>setNewCat(e.target.value)}>
                  <option value="bank">🏦 {tr('Bank', 'Bank')}</option><option value="id">👤 {tr('Identitas', 'Identity')}</option><option value="address">📍 {tr('Alamat', 'Address')}</option><option value="link">🔗 {tr('Link', 'Link')}</option><option value="color">🎨 {tr('Warna', 'Color')}</option>
                </select>
                <button type="button" onClick={()=>setNewPrivate(p=>!p)} className={`border rounded-xl px-3 py-3 text-sm font-bold flex items-center justify-center gap-1.5 ${newPrivate?th.bg+' text-white border-transparent':'bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{newPrivate?<EyeOff size={14}/>:<Eye size={14}/>} {newPrivate?tr('Privat', 'Private'):tr('Publik', 'Public')}</button>
              </div>
              <label className="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer">
                <div className="flex items-center gap-2">
                  <Lock size={13} className={newEncrypt ? th.text : 'text-slate-400'}/>
                  <div>
                    <p className="font-bold text-slate-700 dark:text-slate-300 text-sm">{tr('Enkripsi item ini', 'Encrypt this item')}</p>
                    <p className="text-[0.625rem] text-slate-400">{newEncrypt ? tr('AES-256 — aman','AES-256 — secure') : tr('Tanpa enkripsi','No encryption')}</p>
                  </div>
                </div>
                <div className={`w-11 h-6 rounded-full relative flex-shrink-0 cursor-pointer transition-colors ${newEncrypt ? th.toggleOn : 'bg-slate-200 dark:bg-slate-700'}`} onClick={()=>setNewEncrypt(v=>!v)}><div className={`w-4 h-4 rounded-full absolute top-1 bg-white transition-transform shadow-[0_1px_3px_rgba(0,0,0,0.15)] ${newEncrypt?'translate-x-6':'translate-x-1'}`}/></div>
              </label>
              <button type="submit" className={`w-full ${th.bg} text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 active:scale-[0.98]`}><Plus size={16}/> {tr('Simpan ke Brankas', 'Save to Vault')}</button>
            </form>
          );
        }

        if(activeTab==='draft') return(
          <div className="space-y-4 pt-1">
            {isProMode&&(
              <div className="bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-500/20 p-4 rounded-xl">
                <p className="text-xs font-bold text-amber-600 uppercase tracking-widest mb-2.5 flex items-center gap-1"><Crown size={11}/> <ShieldAlert size={11}/> Sensor Otomatis</p>
                <button onClick={()=>applyDraft(t=>t.replace(/\b\d{5,}\b/g,'*****').replace(/([a-zA-Z0-9._-]+)@([a-zA-Z0-9._-]+)/g,'***@***'))} className="w-full bg-amber-500 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:scale-95"><ShieldAlert size={14}/> Sensor Angka & Email</button>
              </div>
            )}
            <div>
              <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2.5">Kapitalisasi</p>
              <div className="grid grid-cols-2 gap-2">
