                    <Copy size={14}/> {tr('Sortir Cerdas', 'Smart Sort')}
                  </button>
                </div>
              </div>

              <div>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">{tr('Template Cepat', 'Quick Templates')}</p>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={()=>addPreset(language==='id'?['Kamar Utama','Kamar Mandi','Ruang Tamu','Dapur']:['Master Bedroom','Bathroom','Living Room','Kitchen'])} className="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-3 rounded-xl text-sm font-bold text-slate-700 dark:text-slate-300 active:scale-95 text-center leading-tight">
                    {tr('Rumah Standar', 'Standard House')}
                  </button>
                  <button onClick={()=>addPreset(language==='id'?['Kamar Mandi','Dapur','Ruang Kerja','Teras']:['Bathroom','Kitchen','Office','Patio'])} className="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-3 rounded-xl text-sm font-bold text-slate-700 dark:text-slate-300 active:scale-95 text-center leading-tight">
                    {tr('Area Ekstra', 'Extra Areas')}
                  </button>
                </div>
              </div>

              {/* Pro: Auto Reset Toggle */}
              <label className={`flex items-center justify-between p-3 border rounded-xl cursor-pointer ${isProMode ? 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700' : 'bg-slate-100 dark:bg-slate-900 border-transparent opacity-60'}`}>
                <div className="flex items-center gap-2">
                  <RefreshCw size={13} className={bersihAutoReset && isProMode ? th.text : 'text-slate-400'}/>
                  <div>
                    <p className="font-bold text-slate-700 dark:text-slate-300 text-sm flex items-center gap-1.5">{tr('Auto-Reset Harian', 'Daily Auto-Reset')} {!isProMode&&<Crown size={10} className="text-amber-500"/>}</p>
                    <p className="text-[0.625rem] text-slate-400">{tr('Reset jam 00:00 otomatis', 'Reset automatically at 00:00')}</p>
                  </div>
                </div>
                {isProMode ? (
                  <div className={`w-11 h-6 rounded-full relative flex-shrink-0 cursor-pointer transition-colors ${bersihAutoReset ? th.toggleOn : 'bg-slate-200 dark:bg-slate-700'}`} onClick={(e)=>{e.preventDefault(); setBersihAutoReset(!bersihAutoReset);}}><div className={`w-4 h-4 rounded-full absolute top-1 bg-white transition-transform shadow-[0_1px_3px_rgba(0,0,0,0.15)] ${bersihAutoReset?'translate-x-6':'translate-x-1'}`}/></div>
                ) : (
                  <div className="w-11 h-6 rounded-full bg-slate-200 dark:bg-slate-700 relative"><div className="w-4 h-4 rounded-full absolute top-1 bg-white translate-x-1"/></div>
                )}
              </label>

              {/* Hapus Semua */}
              <button onClick={()=>{if(confirm(tr('Hapus semua ruangan?','Delete all rooms?'))){setKlipZones([]);snapDrawer(false);}}} className="w-full bg-slate-100 dark:bg-slate-800 text-rose-500 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 active:scale-95 mt-2 transition-all">
                <Trash2 size={14}/> {tr('Hapus Semua Ruangan', 'Clear All Rooms')}
              </button>

            </div>
          );
        }

        return null;
      };

      /* ════════════════════════════════════
         SMART DRAWER
      ═════════════════════════════════════ */
      const tabLabels={ekstrak:'Ekstrak',brankas:'Brankas',draft:'Draf',hitung:'Hitung',sandi:'Sandi',warna:'Warna',bersih:'Bersih'};
      const renderSmartDrawer = () => (
        <div
          ref={drawerRef}
          id="smart-drawer"
          className="absolute bottom-0 left-0 right-0 bg-white dark:bg-slate-900 rounded-t-[2.5rem] shadow-[0_-16px_40px_rgba(0,0,0,0.10)] z-50 flex flex-col overflow-hidden border-t border-slate-100 dark:border-slate-800"
          style={{height:COLLAPSED_H+'px',touchAction:'none'}}
        >
          {/* Handle zone */}
          <div
            className="w-full flex flex-col items-center pt-3 flex-shrink-0 cursor-grab active:cursor-grabbing"
            onMouseDown={e=>onDragStart(e.clientY)}
            onMouseMove={e=>{ if(e.buttons===1) onDragMove(e.clientY); }}
            onMouseUp={()=>onDragEnd()}
            onTouchStart={e=>{onDragStart(e.touches[0].clientY);}}
            onTouchMove={e=>{onDragMove(e.touches[0].clientY);}}
            onTouchEnd={e=>{onDragEnd();}}
            onClick={()=>{ if(Math.abs(drag.current.lastDy)<8) snapDrawer(!drawerOpen); }}
          >
            <div className={`w-10 h-1.5 rounded-full mb-3 transition-colors ${drawerOpen?'bg-slate-400':'bg-slate-300'}`}/>

            {!drawerOpen&&(
              <div className="w-full flex items-center justify-between px-5 pb-2">
                <div className="flex items-center gap-2 overflow-x-auto hide-scrollbar flex-1">
                  {activeTab==='brankas'&&(
                    <div className="flex gap-1.5">
                      {[['all','Semua'],['bank','Bank'],['id','ID'],['address','Alamat'],['link','Link'],['color','Warna']].map(([f,l])=>(
                        <button key={f} onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();setVaultFilter(f);}} className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap border active:scale-95 ${vaultFilter===f?th.bg+' text-white border-transparent':'bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{l}</button>
                      ))}
                    </div>
                  )}
                  {activeTab==='draft'&&<div className="text-xs font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full flex items-center gap-1.5"><FileText size={12}/> {wc} kata · {draftText.length} kar</div>}
                  {activeTab==='hitung'&&(
                    <div className="flex gap-1.5">
                      <button onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();setTaxPct('11');setSvcPct('0');}} className="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-xs font-bold whitespace-nowrap active:scale-95">PB1 11%</button>
                      <button onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();setTaxPct('11');setSvcPct('5');}} className="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-xs font-bold whitespace-nowrap active:scale-95">+Servis 5%</button>
                    </div>
                  )}
                  {activeTab==='sandi'&&(
                    <div className="flex gap-1.5">
                      {[['ABC',useUpper,setUseUpper],['123',useNums,setUseNums],['#@!',useSyms,setUseSyms]].map(([l,v,s])=>(
                        <button key={l} onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();s(p=>!p);}} className={`px-3 py-1.5 rounded-full text-xs font-bold border active:scale-95 ${v?th.bg+' text-white border-transparent':'bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>{l}</button>
                      ))}
                    </div>
                  )}
                  {activeTab==='ekstrak'&&<div className={`text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-1.5 ${th.light} ${th.text}`}><Wand2 size={12}/> {tr('Pengaturan Ekstrak', 'Extract Settings')}</div>}
                  {activeTab==='warna'&&<button onClick={()=>snapDrawer(true)} className="px-5 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-full text-xs font-bold whitespace-nowrap active:scale-95 flex items-center gap-1.5"><Settings2 size={12}/> Pengaturan Warna</button>}
                </div>
                <div className="flex-shrink-0 ml-3 h-7 w-7 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 cursor-pointer hover:bg-slate-200"><ChevronUp size={15}/></div>
              </div>
            )}
            {drawerOpen&&(
              <div className="w-full flex items-center justify-between px-5 pb-2">
                <span className="text-sm font-black text-slate-900 dark:text-white tracking-wide">Pengaturan {tabLabels[activeTab]}</span>
                <div className="h-7 w-7 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400" style={{transform:'rotate(180deg)'}}><ChevronUp size={15}/></div>
              </div>
            )}
          </div>

          {/* Content */}
          <div className="flex-1 overflow-y-auto px-5 pb-10 hide-scrollbar">
            {renderDrawerContent()}
          </div>
        </div>
      );

      /* ════════════════════════════════════
         WARNA UTILITY
      ═════════════════════════════════════ */
      const renderWarna = () => {
        const renderC = () => {
          const fmtHex = (c) => hexUpper ? c.toUpperCase() : c;
          
          if(!parsedColor) return <div className="text-center py-12 bg-slate-50 dark:bg-slate-800 border border-dashed border-slate-200 dark:border-slate-700 rounded-2xl"><Palette size={20} className="mx-auto mb-2 text-slate-300"/><p className="text-slate-400 text-sm">Masukkan format warna yang valid</p></div>;
          return (
            <div className="space-y-4 fade-in">
              <div className="h-32 w-full rounded-2xl shadow-inner border border-slate-100 dark:border-slate-700 transition-colors" style={{backgroundColor: parsedColor.hex}}></div>
              <div className="space-y-2">
                {[['HEX', fmtHex(parsedColor.hex)], ['RGB', `rgb(${parsedColor.rgb.r}, ${parsedColor.rgb.g}, ${parsedColor.rgb.b})`], ['HSL', `hsl(${parsedColor.hsl.h}, ${parsedColor.hsl.s}%, ${parsedColor.hsl.l}%)`]].map(([l, v]) => (
                  <div key={l} className="flex justify-between items-center bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-3 rounded-xl">
                    <span className="font-bold text-[0.625rem] text-slate-400 uppercase tracking-widest w-10">{l}</span>
                    <span className="font-mono text-sm font-semibold text-slate-700 dark:text-slate-300 flex-1 pl-3">{v}</span>
                    <button onClick={()=>copy(v, l)} className="h-8 w-8 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-800 rounded-lg flex items-center justify-center text-slate-500 active:scale-90"><Copy size={13}/></button>
                  </div>
                ))}
              </div>
            </div>
          );
        };
        const renderP = () => {
          const fmtHex = (c) => hexUpper ? c.toUpperCase() : c;
          if(!parsedColor || !paletteW) return <div className="text-center py-12 text-slate-400 text-sm">Warna tidak valid</div>;
          const Chip = ({c}) => <button onClick={()=>copy(fmtHex(c), 'Hex')} className="h-10 w-full rounded-lg shadow-sm active:scale-95 transition-all outline outline-1 outline-slate-200/50" style={{backgroundColor: c}}></button>;
          const handleKirimVault = () => {
            if(!isProMode) { toast('Khusus Pro!'); return; }
            const noteData = `Base: ${fmtHex(parsedColor.hex)}\nAnalogus: ${paletteW.analogus.map(fmtHex).join(', ')}\nTriadik: ${paletteW.triadik.map(fmtHex).join(', ')}\nKomplementer: ${paletteW.komplementer.map(fmtHex).join(', ')}`;
            saveToVault(noteData, 'color');
          };
          return (
            <div className="space-y-5 fade-in pb-12">
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest flex justify-between"><span>Warna Dasar</span><span className="font-mono">{fmtHex(parsedColor.hex)}</span></p><Chip c={parsedColor.hex}/></div>
              {isProMode && <button onClick={handleKirimVault} className="w-full bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 active:scale-95 border border-emerald-100 dark:border-emerald-500/30"><Crown size={14}/> Simpan ke Brankas</button>}
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest">Analogus</p><div className="flex gap-2">{paletteW.analogus.map((c,i)=><div key={'a'+i} className="flex-1"><Chip c={c}/></div>)}</div></div>
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest">Triadik</p><div className="flex gap-2">{paletteW.triadik.map((c,i)=><div key={'t'+i} className="flex-1"><Chip c={c}/></div>)}</div></div>
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest">Tints (Menuju Putih)</p><div className="flex gap-1">{paletteW.tints.map((c,i)=><div key={'ti'+i} className="flex-1"><Chip c={c}/></div>)}</div></div>
              <div><p className="text-[0.625rem] font-bold text-slate-400 mb-2 uppercase tracking-widest">Shades (Menuju Hitam)</p><div className="flex gap-1">{paletteW.shades.map((c,i)=><div key={'sh'+i} className="flex-1"><Chip c={c}/></div>)}</div></div>
            </div>
          );
        };
        const renderG = () => {
          const colors = gUse3 && isProMode ? `${gColor1}, ${gColor3}, ${gColor2}` : `${gColor1}, ${gColor2}`;
          const cssGrad = `linear-gradient(${gAngle}, ${colors})`;
          return (
            <div className="space-y-4 fade-in pb-12">
              <div className="h-40 w-full rounded-2xl shadow-inner border border-slate-200 dark:border-slate-700" style={{background: cssGrad}}></div>
              <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 font-mono text-xs font-semibold text-slate-600 dark:text-slate-400 leading-relaxed overflow-x-auto">{`background: ${cssGrad};`}</div>
              <button onClick={()=>copy(`background: ${cssGrad};`, 'CSS')} className={`w-full py-3 ${th.bg} text-white font-bold rounded-xl active:scale-95`}>Salin CSS Gradien</button>
              <div className="mt-4 p-5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl space-y-4">
                <div className="flex items-center justify-between"><span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Warna 1</span><div className="w-10 h-10 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700"><input type="color" value={gColor1} onChange={e=>setGColor1(e.target.value)} className="w-[150%] h-[150%] -translate-x-[25%] -translate-y-[25%] cursor-pointer"/></div></div>
                <div className="flex items-center justify-between"><span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Warna 2</span><div className="w-10 h-10 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700"><input type="color" value={gColor2} onChange={e=>setGColor2(e.target.value)} className="w-[150%] h-[150%] -translate-x-[25%] -translate-y-[25%] cursor-pointer"/></div></div>
                <div className={`flex items-center justify-between transition-opacity ${!isProMode?'opacity-50 grayscale':''}`}>
                  <div className="flex items-center gap-1.5"><span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Warna Tengah</span>{!isProMode&&<Crown size={11} className="text-amber-500"/>}</div>
                  <div className="flex items-center gap-3">
                    <div className={`w-14 h-8 rounded-full relative flex-shrink-0 transition-colors ${!isProMode?'cursor-default':'cursor-pointer'} ${gUse3 && isProMode ? th.toggleOn : 'bg-slate-200 dark:bg-slate-700'}`} onClick={()=>{if(isProMode) setGUse3(!gUse3);}}>
                      <div className={`w-6 h-6 rounded-full absolute top-[4px] bg-white transition-transform shadow-[0_1px_3px_rgba(0,0,0,0.15)] ${gUse3 && isProMode ?'translate-x-7':'translate-x-1'}`}/>
                    </div>
                    <div className={`w-10 h-10 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 ${!gUse3||!isProMode?'opacity-30 pointer-events-none':''}`}><input type="color" value={gColor3} onChange={e=>setGColor3(e.target.value)} disabled={!gUse3||!isProMode} className="w-[150%] h-[150%] -translate-x-[25%] -translate-y-[25%] cursor-pointer"/></div>
                  </div>
                </div>
                <div className="flex flex-col gap-3 pt-3 border-t border-slate-100 dark:border-slate-800">
                  <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Arah Gradien</span>
                  <div className="flex gap-2">
                    {['to right', 'to bottom right', 'to bottom', 'to left'].map(a=><button key={a} onClick={()=>setGAngle(a)} className={`flex-1 py-1.5 flex justify-center items-center rounded-lg border transition-all ${gAngle===a?th.bg+' border-transparent text-white shadow-md':'bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 active:scale-95'}`}>{a==='to right'?<ArrowRight size={18}/>:a==='to bottom right'?<ArrowDownRight size={18}/>:a==='to bottom'?<ArrowDown size={18}/>:<ArrowLeft size={18}/>}</button>)}
                  </div>
                </div>
              </div>
            </div>
          );
        };

        return (
          <div className="fade-in space-y-4 pt-2 pb-48">
            <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab6')}.</h2>
            <p className="text-sm font-semibold text-slate-500 dark:text-slate-400 leading-relaxed mb-6">{t('wDesc')}</p>
            <div className="flex bg-slate-200/50 dark:bg-slate-800 p-1 rounded-xl gap-1 mb-5 border border-slate-200/50 dark:border-slate-700">
              {[ ['konversi', t('wKonversi')], ['palet', t('wPalet')], ['gradien', t('wGradien')] ].map(([v, l]) => (
                <button key={v} onClick={()=>setWarnaMode(v)} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${warnaMode===v?'bg-white dark:bg-slate-900 shadow-sm text-slate-800 dark:text-slate-200 ring-1 ring-slate-100 dark:ring-slate-700/50':'text-slate-500 dark:text-slate-400'}`}>{l}</button>
              ))}
            </div>
            {warnaMode !== 'gradien' && (
              <div className="relative mb-5">
                <input type="text" value={warnaInput} onChange={e=>setWarnaInput(e.target.value)} placeholder={t('wCari')} className={`w-full ${th.light} border border-slate-200 dark:border-slate-700 rounded-2xl p-4 pl-12 text-sm font-mono font-bold text-slate-800 dark:text-slate-200 focus:outline-none placeholder-slate-400/70`}/>
                <Palette size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"/>
              </div>
            )}
            {warnaMode === 'konversi' && renderC()}
            {warnaMode === 'palet'    && renderP()}
            {warnaMode === 'gradien'  && renderG()}
          </div>
        );
      };

      /* ════════════════════════════════════
         BERSIH UTILITY
      ═════════════════════════════════════ */
      const renderBersih = () => {
        
        const formatTime = (d) => d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const formatDay = (d) => d.toLocaleDateString(language==='id'?'id-ID':'en-US', {weekday:'long', month:'short', day:'numeric'});
        
        const addZone = (e) => {
          e.preventDefault();
          if(!newZone.trim()) return;
          setKlipZones(prev => [...prev, {id: Date.now().toString(), name: newZone.trim(), isDone: false}]);
          setNewZone('');
          vibrate(20);
        };
        const toggleZone = (id) => { setKlipZones(prev => prev.map(z => z.id === id ? {...z, isDone: !z.isDone} : z)); vibrate(20); };
        const delZone = (e, id) => { e.stopPropagation(); setKlipZones(prev => prev.filter(z => z.id !== id)); vibrate(20); };
        const resetToday = () => { setKlipZones(prev => prev.map(z => ({...z, isDone: false}))); vibrate(50); };
        
        const doneCount = klipZones.filter(z => z.isDone).length;
        const totalCount = klipZones.length;
        const progress = totalCount === 0 ? 0 : Math.round((doneCount / totalCount) * 100);

        return (
          <div className="fade-in space-y-4 pt-2 pb-48">
            <h2 className="text-3xl font-black text-slate-900 dark:text-white tracking-tight">{t('tab7')}.</h2>
            <div className="flex justify-between items-end mb-6">
               <div>
                  <p className="text-sm font-bold text-slate-500 dark:text-slate-400">{formatDay(now)}</p>
                  <p className="text-2xl font-black text-slate-900 dark:text-white tracking-widest">{formatTime(now)}</p>
               </div>
            </div>
            
            {/* Progress */}
            <div className="bg-white dark:bg-slate-900 rounded-2xl p-4 shadow-sm border border-slate-200 dark:border-slate-700 space-y-3">
              <div className="flex justify-between items-center">
                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Progress</span>
                <span className={`text-xs font-black ${progress===100 ? th.text : 'text-slate-600 dark:text-slate-400'}`}>{doneCount} / {totalCount}</span>
              </div>
              <div className="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                <div className={`h-full transition-all duration-500 ease-out ${th.bg}`} style={{width: `${progress}%`}}/>
              </div>
            </div>

            {/* Input Baru */}
            <form onSubmit={addZone} className="flex gap-2 mb-6 mt-4">
              <input type="text" value={newZone} onChange={e=>setNewZone(e.target.value)} placeholder={t('bPh')} className={`flex-1 ${th.light} border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none text-sm font-bold text-slate-900 dark:text-white`} />
              <button type="submit" disabled={!newZone.trim()} className={`h-12 w-12 rounded-xl flex-shrink-0 flex items-center justify-center text-white transition-opacity disabled:opacity-50 ${th.bg}`}><Plus size={18}/></button>
            </form>

            {/* Grid Kartu */}
            {klipZones.length > 0 ? (
              <div className="grid grid-cols-2 gap-3 mb-6">
                {klipZones.map(z => (
                  <button key={z.id} onClick={() => toggleZone(z.id)} className={`relative p-4 rounded-2xl border text-left flex flex-col justify-between aspect-[4/3] transition-all active:scale-95 ${z.isDone ? th.bg + ' ' + th.glow + ' border-transparent' : 'bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600'}`}>
                    <div className="flex justify-between items-start w-full">
                       <div className={`h-6 w-6 rounded-full flex items-center justify-center border-2 transition-all ${z.isDone ? 'border-white bg-white/20 text-white' : 'border-slate-300 dark:border-slate-600 bg-transparent'}`}>
                          {z.isDone && <Check size={12} strokeWidth={4} />}
                       </div>
                       <div onClick={(e)=>delZone(e, z.id)} className={`p-1.5 -m-1.5 rounded-full transition-colors ${z.isDone ? 'text-white/40 hover:text-white/80 hover:bg-white/10' : 'text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10'}`}>
                         <Trash2 size={13}/>
                       </div>
                    </div>

                        <p className="text-[0.6875rem] text-rose-500/70 dark:text-rose-400/60 leading-relaxed">{tr('Masukkan PIN Brankas Anda untuk mengkonfirmasi penghapusan.', 'Enter your Vault PIN to confirm deletion.')}</p>
                        <input type="password" inputMode="numeric" maxLength={6} placeholder="••••••" className="w-full bg-white dark:bg-slate-900 border border-rose-300 dark:border-rose-500/30 rounded-xl px-4 py-3 text-center text-2xl tracking-[0.5em] font-black outline-none text-rose-600" value={wipePin} onChange={e=>setWipePin(e.target.value.replace(/\D/g,''))} autoFocus/>
                        <div className="flex gap-2">
                          <button onClick={()=>{setWipeStep(0);setWipePin('');}} className="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold py-3 rounded-xl active:scale-95">{tr('Batal', 'Cancel')}</button>
                          <button onClick={async()=>{
                            const stored = localStorage.getItem('klip_vault_pin_hash');
                            const attempt = await hashPin(wipePin);
                            if(attempt === stored) {
                              setWipeStep(2);
                            } else {
                              toast(tr('PIN salah!', 'Wrong PIN!')); setWipePin('');
                            }
                          }} disabled={wipePin.length < 4} className="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-1.5 active:scale-95 disabled:opacity-40"><Lock size={13}/> {tr('Verifikasi', 'Verify')}</button>
                        </div>
                      </div>
                    )}
                    {wipeStep === 2 && (
                      <div className="space-y-3 fade-in text-center">
                        <div className="h-14 w-14 bg-rose-100 dark:bg-rose-500/20 rounded-2xl flex items-center justify-center mx-auto"><Trash2 size={28} className="text-rose-500"/></div>
                        <p className="text-sm font-black text-rose-600 dark:text-rose-400">{tr('Anda yakin?', 'Are you sure?')}</p>
                        <p className="text-[0.6875rem] text-rose-500/70 leading-relaxed">{tr(`${vaultItems.length} item akan dihapus permanen dan PIN akan direset.`, `${vaultItems.length} items will be permanently deleted and PIN will be reset.`)}</p>
                        <div className="flex gap-2">
                          <button onClick={()=>{setWipeStep(0);setWipePin('');}} className="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold py-3 rounded-xl active:scale-95">{tr('Batal', 'Cancel')}</button>
                          <button onClick={()=>{
                            localStorage.removeItem('klip_vault_pin_hash');
                            sessionStorage.removeItem('klip_vault_session_pin');
                            setMasterPinSet(false);
                            setVaultLocked(true);
                            setDecryptedVals({});
                            setRevealed({});
                            setVaultItems([]);
                            setWipeStep(0);
                            setWipePin('');
                            toast(tr('Semua data Brankas dihapus.', 'All Vault data deleted.'));
                          }} className="flex-1 bg-rose-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-1.5 active:scale-95">
                            <Trash2 size={13}/> {tr('Hapus Semua', 'Delete All')}
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </section>
              )}
            </div>
          </div>
        );
      };

      /* ════════════════════════════════════
         ROOT
      ═════════════════════════════════════ */
      return(
        <div className="w-full h-[100dvh] bg-[#FAFAFA] dark:bg-[#0c0f1a] flex flex-col relative overflow-hidden sm:max-w-md sm:mx-auto sm:border-x sm:border-slate-200 dark:border-slate-800">
          {reduceMotion !== 'default' && (
            <style>
              {reduceMotion === 'fast' 
                 ? `*, *::before, *::after { animation-duration: 0.1s !important; transition-duration: 0.15s !important; }`
                 : `*, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }`
              }
            </style>
          )}
          
          {showSplash&&(
            <div className="absolute inset-0 bg-[#FAFAFA] dark:bg-slate-950 flex flex-col items-center justify-center splash-bg-anim">
              <div className="flex flex-col items-center gap-5 splash-anim">
                <div className={`h-24 w-24 rounded-[2rem] ${th.bg} flex items-center justify-center shadow-2xl relative overflow-hidden`}>
                  <div className="absolute inset-0 bg-white/10" style={{clipPath:'polygon(0 0, 100% 0, 100% 50%, 0 100%)'}}/>
                  <Scissors size={48} className="text-white stroke-[2.5] relative z-10"/>
                </div>
                <div className="text-center">
                  <h1 className="text-4xl font-black tracking-tight text-slate-900 dark:text-white">Klip.</h1>
                  <p className="text-sm font-bold text-slate-400 mt-1 uppercase tracking-widest">{t('util')}</p>
                </div>
              </div>
            </div>
          )}

          {drawerOpen&&<div className="absolute inset-0 bg-slate-900/40 dark:bg-black/40 backdrop-blur-[2px] z-40" onClick={()=>snapDrawer(false)}/>}

          <div className="px-6 pt-10 pb-2 z-10 flex justify-between items-center bg-[#FAFAFA]/90 dark:bg-[#0c0f1a]/90 backdrop-blur-md flex-shrink-0">
            <div className="flex items-center gap-2">
              <Scissors size={18} className="text-slate-900 dark:text-white stroke-[2.5]"/>
              <h1 className="text-xl font-black tracking-tight text-slate-900 dark:text-white">Klip.</h1>
            </div>
            <div className="flex items-center gap-2.5">
              {isProMode&&<div className="bg-amber-50 dark:bg-amber-500/15 text-amber-600 dark:text-amber-400 px-2.5 py-1 rounded-full text-[0.625rem] font-black tracking-widest uppercase flex items-center gap-1 border border-amber-200 dark:border-amber-500/30"><Crown size={10}/> Pro</div>}
              <button onClick={()=>{setIsGlobalOpen(true); vibrate(20);}} className="h-8 w-8 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-600 dark:text-slate-400 active:scale-90"><Settings2 size={15}/></button>
            </div>
          </div>

          <main className={`flex-1 overflow-y-auto hide-scrollbar relative z-0 ${leftHanded ? 'pl-16 pr-6' : 'pl-6 pr-16'}`}>
            {activeTab==='ekstrak'&&renderEkstrak()}
            {activeTab==='brankas'&&renderBrankas()}
            {activeTab==='draft'  &&renderDraft()}
            {activeTab==='hitung' &&renderTools()}
            {activeTab==='sandi'  &&renderSandi()}
            {activeTab==='warna'  &&renderWarna()}
            {activeTab==='bersih' &&renderBersih()}
          </main>

          {renderSmartDrawer()}
          {renderGlobal()}

          {/* Side Dial */}
          {isDialOpen&&<div className="absolute inset-0 z-20" onClick={()=>setIsDialOpen(false)}/>}
          <div className={`absolute ${leftHanded?'left-0':'right-0'} top-1/2 -translate-y-1/2 z-30 transition-all duration-500 ease-[cubic-bezier(0.2,0.8,0.2,1)] ${drawerOpen||isGlobalOpen?'opacity-0 pointer-events-none '+(leftHanded?'-translate-x-10':'translate-x-10'):'opacity-100'}`}>
            <div className={`relative bg-slate-900/95 backdrop-blur-xl shadow-2xl transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] overflow-hidden ${isDialOpen?'w-24 h-[400px] '+(leftHanded?'rounded-r-[48px] border-y border-r border-slate-700/30':'rounded-l-[48px] border-y border-l border-slate-700/30'):'w-12 h-28 '+(leftHanded?'rounded-r-[28px] cursor-pointer hover:w-14 hover:shadow-[8px_0_30px_rgba(0,0,0,0.3)]':'rounded-l-[28px] cursor-pointer hover:w-14 hover:shadow-[-8px_0_30px_rgba(0,0,0,0.3)]')}`}
              onClick={()=>{if(!isDialOpen){setIsDialOpen(true); vibrate(20);}}}>
              {!isDialOpen&&(
                <><div className={`dial-indicator absolute ${leftHanded?'right-2':'left-2'} top-1/2 -translate-y-1/2 w-1 h-9 ${th.bg} rounded-full transition-all`}/>
                <div className={`absolute ${leftHanded?'right-4':'left-4'} top-1/2 -translate-y-1/2 text-white/90 transition-transform duration-300`}>
                  {DIAL_CONFIG[activeTab] ? React.cloneElement(DIAL_CONFIG[activeTab].icon, {size: 18}) : <Scissors size={18}/>}
                </div></>
              )}
              <div className={`absolute inset-0 transition-opacity duration-400 ${isDialOpen?'opacity-100':'opacity-0 pointer-events-none'}`}>
                <div className={`absolute top-0 ${leftHanded?'right-0':'left-0'} w-full h-12 bg-gradient-to-b from-slate-900 via-slate-900/80 to-transparent z-10 pointer-events-none ${leftHanded?'rounded-tr-[48px]':'rounded-tl-[48px]'}`}/>
                <div className={`absolute bottom-0 ${leftHanded?'right-0':'left-0'} w-full h-12 bg-gradient-to-t from-slate-900 via-slate-900/80 to-transparent z-10 pointer-events-none ${leftHanded?'rounded-br-[48px]':'rounded-bl-[48px]'}`}/>
                <div className={`h-full w-full overflow-y-auto snap-y snap-mandatory hide-scrollbar py-[55%] flex flex-col items-${leftHanded?'start':'end'} px-4 gap-7`}>
                  {dialVisible.map((id,idx)=>{
                    const conf = DIAL_CONFIG[id];
                    if(!conf) return null;
                    const {icon, label, pro} = conf;
                    const locked=pro&&!isProMode;const active=activeTab===id;
                    return(
                      <button key={id} onClick={e=>{e.stopPropagation();if(locked){toast(tr('Khusus Pro','Pro Only')); vibrate(50); return;}setActiveTab(id);setIsDialOpen(false); vibrate(20);}} className={`relative snap-center flex flex-col items-center gap-1.5 w-16 transition-all duration-300 ${active?'scale-110':'scale-90 opacity-60 hover:opacity-80 hover:scale-95'}`} style={isDialOpen?{animation:`dialItemIn 350ms cubic-bezier(0.34,1.56,0.64,1) ${idx * 50}ms both`}:{}}>
                        <div className={`h-14 w-14 rounded-full flex items-center justify-center shadow-lg transition-all duration-300 ${active?th.bg+' text-white ring-2 ring-white/20 '+th.glow:'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>{locked?<Lock size={18} className="text-slate-500 dark:text-slate-400"/>:icon}</div>
                        <span className={`text-[0.5625rem] font-black uppercase tracking-wider transition-colors ${active?th.dialText:'text-slate-500 dark:text-slate-400'}`}>{label}</span>
                        {pro&&!isProMode&&<Crown size={9} className="absolute -top-1 -right-1 text-amber-500"/>}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>

          {/* Modal QR Code (Global) */}
          {qrItem && (
            <div className="absolute inset-0 z-[100] flex items-center justify-center" onClick={()=>setQrItem(null)}>
              <div className="absolute inset-0 bg-slate-900/40 dark:bg-black/40 backdrop-blur-[2px] slide-up" style={{animationDuration: '200ms'}}/>
              <div className="bg-white dark:bg-slate-900 w-[280px] p-6 rounded-3xl shadow-2xl z-20 fade-in slide-up" onClick={e=>e.stopPropagation()}>
                <div className="bg-white p-3 rounded-2xl mb-4 shadow-sm border border-slate-100 dark:border-slate-800 mx-auto w-max [&>svg]:w-48 [&>svg]:h-48" dangerouslySetInnerHTML={{__html: generateQR(getDisplayValue(qrItem))}}></div>
                <h3 className="text-center font-bold text-slate-800 dark:text-slate-200 text-lg mb-1 truncate">{qrItem.title}</h3>
                <p className="text-center text-xs text-slate-400 mb-6 uppercase tracking-widest font-bold">Klip Pro QR Generator</p>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={()=>setQrItem(null)} className="py-3 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold rounded-xl text-sm active:scale-95">Tutup</button>
                  <button onClick={()=>{copy(getDisplayValue(qrItem),qrItem.title);setQrItem(null)}} className={`py-3 ${th.bg} text-white font-bold rounded-xl text-sm active:scale-95 flex items-center justify-center gap-1.5`}><Copy size={14}/> Salin Teks</button>
                </div>
              </div>
            </div>
          )}

          {toastMsg&&(
            <div className="absolute top-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-2 slide-down z-[110]">
              <Check size={14} className="text-emerald-400"/>
              <span className="font-bold text-sm tracking-wide">{toastMsg}</span>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<KlipApp/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
